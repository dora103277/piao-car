<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>聯絡店家 | 驃宇重車</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff85a1;--pink-light:#fff0f3;--pink-soft:#ffd6e0;--pink-mid:#ffb3c6;--brown:#6b3f2a;--dark:#1a1a1a;--red:#e53935;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pink-light);min-height:100vh;}
.topbar{background:linear-gradient(135deg,var(--dark),#333);padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.topbar img{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.topbar-info h1{color:#fff;font-size:17px;font-weight:700;}
.topbar-info p{color:var(--red);font-size:10px;letter-spacing:1px;}
.content{padding:18px 14px 60px;}
.shop-banner{background:linear-gradient(135deg,var(--dark),#2d2d2d);border-radius:20px;padding:22px;margin-bottom:18px;display:flex;align-items:center;gap:16px;}
.shop-banner img{width:60px;height:60px;border-radius:12px;object-fit:cover;}
.shop-name{color:#fff;font-size:18px;font-weight:900;}
.shop-en{color:var(--red);font-size:11px;letter-spacing:1px;margin-top:3px;}
.shop-tag{display:inline-block;background:rgba(229,57,53,.15);color:var(--red);border:1px solid rgba(229,57,53,.3);border-radius:8px;padding:2px 10px;font-size:10px;margin-top:8px;}
.section-title{font-size:13px;font-weight:900;color:var(--brown);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--pink-mid),transparent);border-radius:2px;}
.contact-btn{background:#fff;border:2px solid var(--pink-soft);border-radius:16px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;text-decoration:none;cursor:pointer;transition:all .2s;}
.contact-btn:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 6px 18px rgba(255,133,161,.15);}
.cb-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
.cb-info{flex:1;}
.cb-label{font-size:14px;font-weight:700;color:var(--brown);}
.cb-sub{font-size:11px;color:#aaa;margin-top:2px;}
.cb-arrow{font-size:18px;color:var(--pink-mid);}
.hours-card{background:#fff;border-radius:16px;border:2px solid var(--pink-soft);padding:16px;margin-bottom:18px;}
.hour-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f8f0f2;font-size:13px;}
.hour-row:last-child{border:none;}
.hour-row .day{color:#aaa;}
.hour-row .time{font-weight:700;color:var(--brown);}
.hour-row.today .day,.hour-row.today .time{color:var(--pink);}
.msg-form{background:#fff;border-radius:16px;border:2px solid var(--pink-soft);padding:16px;}
.msg-types{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.msg-type{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--pink-light);border:2px solid var(--pink-soft);color:#c9667c;transition:all .2s;}
.msg-type.active{background:var(--pink);border-color:var(--pink);color:#fff;}
textarea{width:100%;padding:12px;border-radius:12px;border:2px solid var(--pink-soft);font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--brown);outline:none;resize:none;min-height:100px;transition:border-color .2s;}
textarea:focus{border-color:var(--pink);}
.btn-send{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink-mid),var(--pink));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:12px;transition:opacity .2s;}
.btn-send:hover{opacity:.85;}
</style>
</head>
<body>
<div class="topbar">
  <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.display='none'">
  <div class="topbar-info"><h1>聯絡店家</h1><p>PIAO YU.</p></div>
</div>
<div class="content">
  <div class="shop-banner">
    <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.background='#e53935';this.style.display='flex';">
    <div>
      <div class="shop-name">驃宇重車</div>
      <div class="shop-en">PIAO YU.</div>
      <div class="shop-tag">您最信賴的二手車專家</div>
    </div>
  </div>

  <div class="section-title">快速聯絡</div>
  <a class="contact-btn" href="tel:0979033333">
    <span class="cb-icon">📞</span>
    <div class="cb-info"><div class="cb-label">直接來電</div><div class="cb-sub">0979-033-333</div></div>
    <span class="cb-arrow">›</span>
  </a>
  <a class="contact-btn" href="tel:0981868658">
    <span class="cb-icon">📞</span>
    <div class="cb-info"><div class="cb-label">直接來電</div><div class="cb-sub">0981-868-658</div></div>
    <span class="cb-arrow">›</span>
  </a>
  <a class="contact-btn" href="https://share.google/HyKepADQyQxk5Rvhy" target="_blank">
    <span class="cb-icon">📍</span>
    <div class="cb-info"><div class="cb-label">查看地址</div><div class="cb-sub">新北市土城區永寧路23號</div></div>
    <span class="cb-arrow">›</span>
  </a>
  <a class="contact-btn" href="https://line.me/R/ti/p/@704uyvki" target="_blank">
    <span class="cb-icon">💬</span>
    <div class="cb-info"><div class="cb-label">LINE 訊息</div><div class="cb-sub">點此直接傳訊息給我們</div></div>
    <span class="cb-arrow">›</span>
  </a>
  <a class="contact-btn" href="https://line.me/R/ti/p/@704uyvki" target="_blank">
    <span class="cb-icon">🔗</span>
    <div class="cb-info"><div class="cb-label">加入好友</div><div class="cb-sub">@704uyvki</div></div>
    <span class="cb-arrow">›</span>
  </a>

  <div class="section-title" style="margin-top:20px;">營業時間</div>
  <div class="hours-card" id="hoursCard"></div>

  <div class="section-title">傳送訊息</div>
  <div class="msg-form">
    <div class="msg-types">
      <div class="msg-type active" onclick="selType(this,'詢問車況')">詢問車況</div>
      <div class="msg-type" onclick="selType(this,'預約問題')">預約問題</div>
      <div class="msg-type" onclick="selType(this,'付款問題')">付款問題</div>
      <div class="msg-type" onclick="selType(this,'其他')">其他</div>
    </div>
    <textarea id="msgText" placeholder="請輸入您的問題或留言…"></textarea>
    <button class="btn-send" onclick="sendMsg()">傳送訊息 💌</button>
  </div>
</div>

<script>
const LIFF_ID = '2009926811-ZVOvTTxQ';
let selectedType = '詢問車況';

const days = ['週日','週一','週二','週三','週四','週五','週六'];
const todayIdx = new Date().getDay();
document.getElementById('hoursCard').innerHTML = days.map((d,i) => `
  <div class="hour-row ${i===todayIdx?'today':''}">
    <span class="day">${d}${i===todayIdx?' (今天)':''}</span>
    <span class="time">${i===0?'採預約制':'有客人就接 💕'}</span>
  </div>
`).join('');

function selType(el, t) {
  document.querySelectorAll('.msg-type').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = t;
}

async function init() {
  await liff.init({ liffId: LIFF_ID });
}

async function sendMsg() {
  const text = document.getElementById('msgText').value.trim();
  if (!text) { alert('請輸入訊息內容'); return; }
  const fullMsg = encodeURIComponent(`【${selectedType}】\n${text}`);
  // 開啟 LINE 官方帳號對話並帶入訊息
  liff.openWindow({
    url: `https://line.me/R/oaMessage/@704uyvki/?${fullMsg}`,
    external: false
  });
}

init().catch(console.error);
</script>
</body>
</html>
