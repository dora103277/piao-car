<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>預約 | 驃宇重車</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pk:#ff85a1;--pl:#fff0f3;--ps:#ffd6e0;--pm:#ffb3c6;--br:#6b3f2a;--dk:#1a1a1a;--rd:#e53935;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pl);min-height:100vh;}
.topbar{background:linear-gradient(135deg,#1a1a1a,#333);padding:14px 16px;display:flex;align-items:center;gap:10px;}
.topbar img{width:32px;height:32px;border-radius:6px;object-fit:cover;}
.topbar h1{color:#fff;font-size:16px;font-weight:700;}
.topbar p{color:var(--rd);font-size:9px;letter-spacing:1px;}
.content{padding:16px 14px 60px;}
.st{font-size:12px;font-weight:900;color:var(--br);margin:14px 0 8px;display:flex;align-items:center;gap:6px;}
.st::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--pm),transparent);border-radius:2px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.tb2{background:#fff;border:2px solid var(--ps);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.tb2.on{border-color:var(--pk);background:var(--pl);}
.tb2 .ti{font-size:26px;margin-bottom:5px;}
.tb2 .tl{font-size:13px;font-weight:700;color:var(--br);}
.tb2.on .tl{color:var(--pk);}
.warn{background:#fff3cd;border:1.5px solid #ffd54f;border-radius:10px;padding:10px 12px;font-size:11px;color:#856404;margin-bottom:12px;display:none;}
.warn.show{display:flex;gap:6px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--br);margin-bottom:4px;}
.fg label .req{color:var(--rd);margin-left:2px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border-radius:11px;border:2px solid var(--ps);background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--br);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--pk);}
.fg textarea{resize:vertical;min-height:70px;}
/* 聯絡方式擇一 */
.contact-box{background:#fff;border-radius:12px;border:2px solid var(--ps);overflow:hidden;margin-bottom:4px;}
.contact-tabs{display:flex;}
.ctab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;color:#aaa;background:#f9f9f9;transition:all .2s;}
.ctab.on{color:var(--pk);background:var(--pl);}
.ctab-body{padding:12px;}
/* 時間滾輪 */
.time-box{background:#fff;border-radius:14px;border:2px solid var(--ps);padding:14px;}
.scroll-wrap{display:flex;align-items:center;justify-content:center;gap:10px;}
.scroll-col{text-align:center;}
.scroll-col .lbl{font-size:10px;color:#aaa;margin-bottom:4px;}
.scroll-outer{height:120px;overflow:hidden;position:relative;width:70px;}
.scroll-inner{overflow-y:scroll;height:120px;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;}
.scroll-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--br);scroll-snap-align:start;}
.scroll-line{position:absolute;top:40px;left:0;right:0;height:40px;border-top:2px solid var(--pk);border-bottom:2px solid var(--pk);pointer-events:none;border-radius:8px;background:rgba(255,133,161,.08);}
.time-display{text-align:center;font-size:22px;font-weight:900;color:var(--br);margin-top:10px;}
.colon{font-size:28px;font-weight:900;color:#ccc;}
/* 按鈕 */
.btn-submit{width:100%;padding:15px;background:linear-gradient(135deg,var(--pm),var(--pk));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:900;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:20px;box-shadow:0 6px 20px rgba(255,133,161,.4);}
.btn-submit:disabled{opacity:.5;}
/* 成功畫面 */
.success{display:none;text-align:center;padding:50px 20px;}
.success.show{display:block;}
.success-icon{font-size:70px;margin-bottom:16px;}
.success h2{font-size:20px;font-weight:900;color:var(--br);margin-bottom:8px;}
.success p{font-size:12px;color:#999;line-height:1.7;}
.sc{background:#fff;border-radius:14px;border:2px solid var(--ps);padding:16px;margin:16px 0;text-align:left;}
.sr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.sr:last-child{border:none;}
.sr .k{color:#aaa;} .sr .v{font-weight:700;color:var(--br);}
.btn-close{width:100%;padding:13px;background:#fff;border:2px solid var(--ps);border-radius:12px;font-size:13px;font-weight:700;color:var(--pk);font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
.date-warn{font-size:11px;color:var(--rd);margin-top:4px;display:none;}
</style>
</head>
<body>
<div class="topbar">
  <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.display='none'">
  <div><h1>預約</h1><p>PIAO YU.</p></div>
</div>

<div id="formArea" class="content">
  <div class="st">預約類型</div>
  <div class="type-grid">
    <div class="tb2 on" id="t-bike" onclick="setType('bike')">
      <div class="ti">🏍️</div><div class="tl">看重機</div>
    </div>
    <div class="tb2" id="t-maint" onclick="setType('maint')">
      <div class="ti">🔧</div><div class="tl">保養</div>
    </div>
  </div>
  <div class="warn" id="maint-warn">⚠️ 保養假日（週六/日）需提前兩天以上預約</div>

  <div class="st" id="vehicle-label">想看的重機</div>
  <div class="fg" id="vehicle-field">
    <label>車款 <span style="font-size:10px;color:#aaa;">（選填）</span></label>
    <select id="vehicleSel"><option value="">— 請選擇或略過 —</option></select>
  </div>
  <div class="fg" id="maint-vehicle-field" style="display:none;">
    <label>保養車輛 <span style="font-size:10px;color:#aaa;">（自填）</span></label>
    <input type="text" id="maintVehicle" placeholder="例：HONDA CBR600RR">
  </div>

  <div class="st">個人資料</div>
  <div class="fg"><label>姓名<span class="req">*</span></label><input type="text" id="custName" placeholder="請輸入您的姓名"></div>
  <div class="fg"><label>聯絡電話<span class="req">*</span></label><input type="tel" id="custPhone" placeholder="09xxxxxxxx"></div>

  <div class="st">聯絡方式（擇一必填）</div>
  <div class="contact-box">
    <div class="contact-tabs">
      <div class="ctab on" id="ctab-line" onclick="setContact('line')">💬 LINE ID</div>
      <div class="ctab" id="ctab-ig" onclick="setContact('ig')">📸 Instagram</div>
    </div>
    <div class="ctab-body">
      <div id="line-field" class="fg" style="margin:0;">
        <input type="text" id="lineId" placeholder="請填入 LINE ID（必填其一）">
      </div>
      <div id="ig-field" class="fg" style="margin:0;display:none;">
        <input type="text" id="igId" placeholder="請填入 Instagram 帳號（必填其一）">
      </div>
    </div>
  </div>

  <div class="st">預約日期</div>
  <div class="fg">
    <label>日期<span class="req">*</span></label>
    <input type="date" id="bookDate" onchange="checkDate()">
    <div class="date-warn" id="dateWarn">⚠️ 保養假日需提前兩天以上預約，請換日期</div>
  </div>

  <div class="st">預約時間</div>
  <div class="time-box">
    <div class="scroll-wrap">
      <div class="scroll-col">
        <div class="lbl">小時</div>
        <div class="scroll-outer">
          <div class="scroll-inner" id="hourScroll" onscroll="updateHour()">
            <div style="height:40px;"></div>
            <div id="hourItems"></div>
            <div style="height:40px;"></div>
          </div>
          <div class="scroll-line"></div>
        </div>
      </div>
      <div class="colon">:</div>
      <div class="scroll-col">
        <div class="lbl">分鐘</div>
        <div class="scroll-outer">
          <div class="scroll-inner" id="minScroll" onscroll="updateMin()">
            <div style="height:40px;"></div>
            <div id="minItems"></div>
            <div style="height:40px;"></div>
          </div>
          <div class="scroll-line"></div>
        </div>
      </div>
    </div>
    <div class="time-display" id="timeDisplay">00:00</div>
  </div>

  <div class="st">備註</div>
  <div class="fg"><textarea id="notes" placeholder="有什麼想告訴我們的嗎？（選填）"></textarea></div>

  <button class="btn-submit" id="submitBtn" onclick="submitBooking()">確認預約 ✨</button>
</div>

<div class="success" id="successScreen">
  <div class="success-icon">🎉</div>
  <h2>預約成功！</h2>
  <p>我們會盡快與您確認預約<br>請保持電話暢通 💕</p>
  <div class="sc" id="successCard"></div>
  <button class="btn-close" onclick="liff.closeWindow()">關閉視窗</button>
</div>

<script>
const SU='https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const LIFF_ID='2009926811-UQty4dKV';
const sb=supabase.createClient(SU,SK);
let uid='',bType='bike',selH=0,selM='00',contactType='line';

async function init(){
  document.getElementById('bookDate').min=new Date().toISOString().split('T')[0];
  buildWheels();
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login();return;}
    const p=await liff.getProfile();uid=p.userId;
    const{data:m}=await sb.from('members').select('name,phone,line_id').eq('line_user_id',uid).single();
    if(m){
      if(m.name)document.getElementById('custName').value=m.name;
      if(m.phone)document.getElementById('custPhone').value=m.phone;
      if(m.line_id)document.getElementById('lineId').value=m.line_id;
    }
  }catch(e){console.log('LIFF',e);}

  // 載入在庫車輛
  const{data:v}=await sb.from('vehicles').select('id,name').eq('status','在庫');
  const sel=document.getElementById('vehicleSel');
  (v||[]).forEach(x=>{const o=document.createElement('option');o.value=x.id;o.textContent=x.name;sel.appendChild(o);});

  // 從網址帶入車款
  const params=new URLSearchParams(window.location.search);
  const vn=params.get('vehicle');
  if(vn){const match=(v||[]).find(x=>x.name===vn);if(match)sel.value=match.id;}
}

function buildWheels(){
  const hours=Array.from({length:24},(_,i)=>i); // 0-23
  const mins=['00','30'];
  document.getElementById('hourItems').innerHTML=hours.map(h=>`<div class="scroll-item">${String(h).padStart(2,'0')}</div>`).join('');
  document.getElementById('minItems').innerHTML=mins.map(m=>`<div class="scroll-item">${m}</div>`).join('');
  document.getElementById('hourScroll').scrollTop=0;
  document.getElementById('minScroll').scrollTop=0;
  updateDisplay();
}

function updateHour(){
  const idx=Math.round(document.getElementById('hourScroll').scrollTop/40);
  selH=Math.max(0,Math.min(23,idx));updateDisplay();
}
function updateMin(){
  const idx=Math.round(document.getElementById('minScroll').scrollTop/40);
  selM=idx===0?'00':'30';updateDisplay();
}
function updateDisplay(){
  const el=document.getElementById('timeDisplay');
  if(el)el.textContent=`${String(selH).padStart(2,'0')}:${selM}`;
}

function setType(t){
  bType=t;
  document.getElementById('t-bike').className='tb2'+(t==='bike'?' on':'');
  document.getElementById('t-maint').className='tb2'+(t==='maint'?' on':'');
  document.getElementById('maint-warn').className='warn'+(t==='maint'?' show':'');
  document.getElementById('vehicle-field').style.display=t==='bike'?'block':'none';
  document.getElementById('maint-vehicle-field').style.display=t==='maint'?'block':'none';
  document.getElementById('vehicle-label').textContent=t==='bike'?'想看的重機':'保養車輛';
  checkDate();
}

function setContact(t){
  contactType=t;
  document.getElementById('ctab-line').className='ctab'+(t==='line'?' on':'');
  document.getElementById('ctab-ig').className='ctab'+(t==='ig'?' on':'');
  document.getElementById('line-field').style.display=t==='line'?'block':'none';
  document.getElementById('ig-field').style.display=t==='ig'?'block':'none';
}

function checkDate(){
  const d=document.getElementById('bookDate').value;
  const warn=document.getElementById('dateWarn');
  if(!d||bType!=='maint'){warn.style.display='none';return;}
  const day=new Date(d).getDay();
  const isWknd=day===0||day===6;
  const today=new Date();today.setHours(0,0,0,0);
  const twoDay=new Date(today);twoDay.setDate(twoDay.getDate()+2);
  warn.style.display=(isWknd&&new Date(d)<twoDay)?'block':'none';
}

async function submitBooking(){
  const name=document.getElementById('custName').value.trim();
  const phone=document.getElementById('custPhone').value.trim();
  const date=document.getElementById('bookDate').value;
  const lineId=document.getElementById('lineId').value.trim();
  const igId=document.getElementById('igId').value.trim();
  const notes=document.getElementById('notes').value.trim();
  const timeStr=`${String(selH).padStart(2,'0')}:${selM}`;

  // 驗證
  if(!name){alert('請填寫姓名');return;}
  if(!phone){alert('請填寫電話');return;}
  if(!date){alert('請選擇日期');return;}
  if(document.getElementById('dateWarn').style.display==='block'){alert('此日期不可預約保養');return;}

  // 聯絡方式擇一必填
  const contact=contactType==='line'?lineId:igId;
  if(!contact){alert(`請填寫${contactType==='line'?'LINE ID':'Instagram 帳號'}（擇一必填）`);return;}

  // 取得車款名
  let vname='';
  if(bType==='bike'){
    vname=document.getElementById('vehicleSel').selectedOptions[0]?.text||'';
    if(vname==='— 請選擇或略過 —')vname='';
  } else {
    vname=document.getElementById('maintVehicle').value.trim();
  }

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='送出中…';

  const{error}=await sb.from('bookings').insert({
    line_user_id:uid||'guest',
    customer_name:name,phone,
    line_id:contactType==='line'?lineId:null,
    instagram:contactType==='ig'?igId:null,
    vehicle_name:vname||null,
    booking_type:bType==='bike'?'看重機':'保養',
    booking_date:date,booking_time:timeStr,
    notes:notes||null,status:'待確認',
  });

  if(error){alert('送出失敗：'+error.message);btn.disabled=false;btn.textContent='確認預約 ✨';return;}

  document.getElementById('formArea').style.display='none';
  document.getElementById('successScreen').classList.add('show');
  document.getElementById('successCard').innerHTML=`
    <div class="sr"><span class="k">類型</span><span class="v">${bType==='bike'?'🏍️ 看重機':'🔧 保養'}</span></div>
    ${vname?`<div class="sr"><span class="k">車款</span><span class="v">${vname}</span></div>`:''}
    <div class="sr"><span class="k">日期</span><span class="v">${date}</span></div>
    <div class="sr"><span class="k">時間</span><span class="v">${timeStr}</span></div>
    <div class="sr"><span class="k">聯絡</span><span class="v">${contactType==='line'?'💬 '+lineId:'📸 '+igId}</span></div>
    <div class="sr"><span class="k">狀態</span><span class="v">⏳ 待店家確認</span></div>
  `;
}

init().catch(console.error);
</script>
</body>
</html>
