<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>預約看車/保養 | 驃宇重車</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff85a1;--pink-light:#fff0f3;--pink-soft:#ffd6e0;--pink-mid:#ffb3c6;--brown:#6b3f2a;--dark:#1a1a1a;--red:#e53935;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pink-light);min-height:100vh;}
.topbar{background:linear-gradient(135deg,var(--dark),#333);padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.topbar img{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.topbar-info h1{color:#fff;font-size:17px;font-weight:700;}
.topbar-info p{color:var(--red);font-size:10px;letter-spacing:1px;}
.content{padding:18px 16px 60px;}
.section-title{font-size:13px;font-weight:900;color:var(--brown);margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--pink-mid),transparent);border-radius:2px;}
.type-sel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.type-btn{background:#fff;border:2px solid var(--pink-soft);border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.type-btn.active{border-color:var(--pink);background:var(--pink-light);}
.type-icon{font-size:28px;margin-bottom:6px;}
.type-label{font-size:13px;font-weight:700;color:var(--brown);}
.type-btn.active .type-label{color:var(--pink);}
.warn-box{background:#fff3cd;border:1.5px solid #ffd54f;border-radius:12px;padding:12px 14px;font-size:12px;color:#856404;margin-bottom:14px;display:flex;gap:8px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--brown);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--pink-soft);background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--brown);outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--pink);}
.form-group textarea{resize:vertical;min-height:80px;}
.contact-opts{display:flex;gap:8px;margin-bottom:10px;}
.opt-btn{flex:1;padding:9px;border:2px solid var(--pink-soft);border-radius:10px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:#aaa;background:#fff;transition:all .2s;}
.opt-btn.active{border-color:var(--pink);color:var(--pink);background:var(--pink-light);}
.time-section{background:#fff;border-radius:16px;border:2px solid var(--pink-soft);padding:14px;}
.ampm-toggle{display:flex;background:var(--pink-soft);border-radius:10px;padding:3px;margin-bottom:12px;}
.ampm-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:#c9667c;transition:all .2s;}
.ampm-btn.active{background:var(--pink);color:#fff;}
.time-display{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.hour-box{font-size:28px;font-weight:900;color:var(--brown);background:var(--pink-light);border-radius:12px;padding:10px 18px;min-width:70px;text-align:center;}
.colon{font-size:24px;font-weight:900;color:#ccc;}
.min-toggle{display:flex;background:var(--pink-soft);border-radius:10px;padding:3px;}
.min-btn{flex:1;padding:8px 14px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:#c9667c;text-align:center;transition:all .2s;}
.min-btn.active{background:var(--pink);color:#fff;}
.hour-grid{display:flex;flex-wrap:wrap;gap:6px;}
.hour-chip{padding:6px 12px;border:2px solid var(--pink-soft);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--brown);background:#fff;transition:all .2s;}
.hour-chip.active{border-color:var(--pink);background:var(--pink-light);color:var(--pink);}
.date-warn{font-size:11px;color:var(--red);margin-top:5px;}
.btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,var(--pink-mid),var(--pink));color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:900;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:24px;box-shadow:0 6px 20px rgba(255,133,161,.4);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.success{display:none;text-align:center;padding:50px 20px;}
.success.show{display:block;}
.success-icon{font-size:80px;margin-bottom:20px;}
.success h2{font-size:22px;font-weight:900;color:var(--brown);margin-bottom:10px;}
.success p{font-size:13px;color:#999;line-height:1.7;}
.success-card{background:#fff;border-radius:16px;border:2px solid var(--pink-soft);padding:18px;margin:20px 0;text-align:left;}
.sc-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;}
.sc-row:last-child{border:none;}
.sc-row .k{color:#aaa;}
.sc-row .v{font-weight:700;color:var(--brown);}
.btn-close{width:100%;padding:14px;background:#fff;border:2px solid var(--pink-soft);border-radius:14px;font-size:14px;font-weight:700;color:var(--pink);font-family:'Noto Sans TC',sans-serif;cursor:pointer;}
</style>
</head>
<body>
<div class="topbar">
  <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.display='none'">
  <div class="topbar-info"><h1>預約看車/保養</h1><p>PIAO YU.</p></div>
</div>

<div id="formArea" class="content">
  <div class="section-title">預約類型</div>
  <div class="type-sel">
    <div class="type-btn active" id="type-car" onclick="setType('car')">
      <div class="type-icon">🚗</div><div class="type-label">看車</div>
    </div>
    <div class="type-btn" id="type-maint" onclick="setType('maint')">
      <div class="type-icon">🔧</div><div class="type-label">保養</div>
    </div>
  </div>
  <div id="maint-warn" style="display:none;" class="warn-box">⚠️ 保養假日（週六/日）需提前兩天以上預約</div>

  <div class="section-title">選擇車輛</div>
  <div class="form-group">
    <label>車款</label>
    <select id="vehicleSel"><option value="">— 請選擇車款 —</option></select>
  </div>

  <div class="section-title">個人資料</div>
  <div class="form-group"><label>姓名 *</label><input type="text" id="custName" placeholder="請輸入您的姓名"></div>
  <div class="form-group"><label>聯絡電話 *</label><input type="tel" id="custPhone" placeholder="09xxxxxxxx"></div>

  <div class="section-title">其他聯絡方式（選填）</div>
  <div class="contact-opts">
    <div class="opt-btn" id="opt-line" onclick="toggleOpt('line')">💬 LINE ID</div>
    <div class="opt-btn" id="opt-ig" onclick="toggleOpt('ig')">📸 Instagram</div>
  </div>
  <div id="line-field" style="display:none;" class="form-group">
    <label>LINE ID</label><input type="text" id="lineId" placeholder="@xxxxxxxx">
  </div>
  <div id="ig-field" style="display:none;" class="form-group">
    <label>Instagram 帳號</label><input type="text" id="igId" placeholder="@xxxxxxxx">
  </div>

  <div class="section-title">預約日期</div>
  <div class="form-group">
    <label>日期 *</label>
    <input type="date" id="bookDate">
    <div class="date-warn" id="dateWarn" style="display:none;">⚠️ 保養假日需提前兩天以上預約，此日期不可選</div>
  </div>

  <div class="section-title">預約時間</div>
  <div class="time-section">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:#aaa;margin-bottom:4px;">小時</div>
        <div style="height:120px;overflow:hidden;position:relative;width:70px;">
          <div id="hourScroll" style="overflow-y:scroll;height:120px;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;"
            onscroll="updateHourFromScroll()">
            <div style="height:40px;"></div>
            <div id="hourItems"></div>
            <div style="height:40px;"></div>
          </div>
          <div style="position:absolute;top:40px;left:0;right:0;height:40px;border-top:2px solid var(--pink);border-bottom:2px solid var(--pink);pointer-events:none;border-radius:8px;background:rgba(255,133,161,.08);"></div>
        </div>
      </div>
      <div style="font-size:28px;font-weight:900;color:#ccc;">:</div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:#aaa;margin-bottom:4px;">分鐘</div>
        <div style="height:120px;overflow:hidden;position:relative;width:70px;">
          <div id="minScroll" style="overflow-y:scroll;height:120px;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;"
            onscroll="updateMinFromScroll()">
            <div style="height:40px;"></div>
            <div id="minItems"></div>
            <div style="height:40px;"></div>
          </div>
          <div style="position:absolute;top:40px;left:0;right:0;height:40px;border-top:2px solid var(--pink);border-bottom:2px solid var(--pink);pointer-events:none;border-radius:8px;background:rgba(255,133,161,.08);"></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;font-size:22px;font-weight:900;color:var(--brown);" id="timeDisplay">12:00</div>
  </div>

  <div class="section-title">備註</div>
  <div class="form-group"><textarea id="notes" placeholder="有什麼想告訴我們的嗎？（選填）"></textarea></div>

  <button class="btn-submit" id="submitBtn" onclick="submitBooking()">確認預約 ✨</button>
</div>

<div class="success" id="successScreen">
  <div class="success-icon">🎉</div>
  <h2>預約成功！</h2>
  <p>我們會盡快與您確認預約<br>請保持電話暢通 💕</p>
  <div class="success-card" id="successCard"></div>
  <button class="btn-close" onclick="liff.closeWindow()">關閉視窗</button>
</div>

<script>
const SUPABASE_URL = 'https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const LIFF_ID = '2009926811-UQty4dKV';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let lineUserId = '', bookingType = 'car', selHour = 12, selMin = '00';

async function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('bookDate').min = today;
  document.getElementById('bookDate').addEventListener('change', checkDate);

  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const profile = await liff.getProfile();
  lineUserId = profile.userId;

  const { data: member } = await sb.from('members').select('name,phone,line_id,instagram').eq('line_user_id', lineUserId).single();
  if (member) {
    if (member.name) document.getElementById('custName').value = member.name;
    if (member.phone) document.getElementById('custPhone').value = member.phone;
  }

  const { data: vehicles } = await sb.from('vehicles').select('id,name').eq('status','在庫');
  const sel = document.getElementById('vehicleSel');
  (vehicles||[]).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id; opt.textContent = v.name; sel.appendChild(opt);
  });

  const params = new URLSearchParams(window.location.search);
  const vName = params.get('vehicle');
  if (vName) {
    const match = (vehicles||[]).find(v => v.name === vName);
    if (match) sel.value = match.id;
  }

  buildScrollWheels();
}

function buildScrollWheels() {
  // Hours 12-24
  const hours = Array.from({length:13},(_,i)=>i+12);
  const mins = ['00','30'];
  const hEl = document.getElementById('hourItems');
  const mEl = document.getElementById('minItems');
  hEl.innerHTML = hours.map(h=>`<div style="height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--brown);scroll-snap-align:start;">${h}</div>`).join('');
  mEl.innerHTML = mins.map(m=>`<div style="height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--brown);scroll-snap-align:start;">${m}</div>`).join('');
  // Set initial position to 12
  document.getElementById('hourScroll').scrollTop = 0;
  document.getElementById('minScroll').scrollTop = 0;
  updateTimeDisplay();
}

function updateHourFromScroll() {
  const idx = Math.round(document.getElementById('hourScroll').scrollTop / 40);
  selHour = 12 + Math.max(0, Math.min(12, idx));
  updateTimeDisplay();
}
function updateMinFromScroll() {
  const idx = Math.round(document.getElementById('minScroll').scrollTop / 40);
  selMin = idx === 0 ? '00' : '30';
  updateTimeDisplay();
}
function updateTimeDisplay() {
  const el = document.getElementById('timeDisplay');
  if(el) el.textContent = `${selHour}:${selMin}`;
}
function setType(t) {
  bookingType = t;
  document.getElementById('type-car').className = 'type-btn' + (t==='car'?' active':'');
  document.getElementById('type-maint').className = 'type-btn' + (t==='maint'?' active':'');
  document.getElementById('maint-warn').style.display = t==='maint'?'flex':'none';
  checkDate();
}
function toggleOpt(t) {
  const el = document.getElementById('opt-'+t);
  const field = document.getElementById(t+'-field');
  const active = el.classList.contains('active');
  el.className = 'opt-btn' + (active ? '' : ' active');
  field.style.display = active ? 'none' : 'block';
}
function checkDate() {
  const dateVal = document.getElementById('bookDate').value;
  if (!dateVal || bookingType !== 'maint') { document.getElementById('dateWarn').style.display='none'; return; }
  const d = new Date(dateVal);
  const day = d.getDay();
  const isWeekend = day === 0 || day === 6;
  const today = new Date(); today.setHours(0,0,0,0);
  const twoDaysLater = new Date(today); twoDaysLater.setDate(twoDaysLater.getDate()+2);
  document.getElementById('dateWarn').style.display = (isWeekend && d < twoDaysLater) ? 'block' : 'none';
}

async function submitBooking() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const date = document.getElementById('bookDate').value;
  const vid = document.getElementById('vehicleSel').value;
  const vname = document.getElementById('vehicleSel').selectedOptions[0]?.text || '';
  const lineId = document.getElementById('lineId')?.value.trim() || '';
  const igId = document.getElementById('igId')?.value.trim() || '';
  const notes = document.getElementById('notes').value.trim();
  const timeStr = `${selHour}:${selMin}`;

  if (!name) { alert('請填寫姓名'); return; }
  if (!phone) { alert('請填寫電話'); return; }
  if (!date) { alert('請選擇日期'); return; }
  if (document.getElementById('dateWarn').style.display === 'block') { alert('此日期不可預約保養，請選擇其他日期'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';

  const { error } = await sb.from('bookings').insert({
    line_user_id: lineUserId,
    customer_name: name, phone,
    line_id: lineId || null,
    instagram: igId || null,
    vehicle_id: vid || null,
    vehicle_name: vname !== '— 請選擇車款 —' ? vname : null,
    booking_type: bookingType === 'car' ? '看車' : '保養',
    booking_date: date, booking_time: timeStr,
    notes: notes || null, status: '待確認',
  });

  if (error) { alert('送出失敗：' + error.message); btn.disabled = false; btn.textContent = '確認預約 ✨'; return; }

  document.getElementById('formArea').style.display = 'none';
  document.getElementById('successScreen').classList.add('show');
  document.getElementById('successCard').innerHTML = `
    <div class="sc-row"><span class="k">類型</span><span class="v">${bookingType==='car'?'🚗 看車':'🔧 保養'}</span></div>
    <div class="sc-row"><span class="k">車款</span><span class="v">${vname!=='— 請選擇車款 —'?vname:'未指定'}</span></div>
    <div class="sc-row"><span class="k">日期</span><span class="v">${date}</span></div>
    <div class="sc-row"><span class="k">時間</span><span class="v">${timeStr}</span></div>
    <div class="sc-row"><span class="k">狀態</span><span class="v">⏳ 待店家確認</span></div>
  `;
}

init().catch(console.error);
</script>
</body>
</html>
