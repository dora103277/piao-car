<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料匯入工具</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#fff0f3;padding:20px;max-width:600px;margin:0 auto;}
h1{color:#ff85a1;}
.card{background:#fff;border-radius:14px;border:2px solid #ffd6e0;padding:20px;margin-bottom:16px;}
button{background:linear-gradient(135deg,#ffb3c6,#ff85a1);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
#log{background:#1a1a1a;color:#0f0;border-radius:10px;padding:16px;font-size:12px;font-family:monospace;min-height:200px;white-space:pre-wrap;margin-top:16px;overflow-y:auto;max-height:500px;}
.ok{color:#0f0;}.err{color:#f55;}.info{color:#ff0;}
</style>
</head>
<body>
<h1>🔧 資料匯入工具</h1>
<div class="card">
  <div style="font-weight:700;margin-bottom:10px;">選擇備份檔案</div>
  <input type="file" id="fileInput" accept=".json" style="width:100%;padding:10px;border:2px solid #ffd6e0;border-radius:10px;box-sizing:border-box;">
  <button onclick="runImport()">🚀 開始匯入</button>
</div>
<div id="log">等待匯入...</div>
<script>
const SU='https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const sb=supabase.createClient(SU,SK);
const logEl=document.getElementById('log');
function L(msg,t='info'){const s=document.createElement('span');s.className=t;s.textContent=msg+'\n';logEl.appendChild(s);logEl.scrollTop=logEl.scrollHeight;}

async function runImport(){
  const file=document.getElementById('fileInput').files[0];
  if(!file){alert('請選擇檔案');return;}
  logEl.innerHTML='';
  L('📂 讀取檔案...','info');
  const text=await file.text();
  let data;
  try{data=JSON.parse(text);}catch(e){L('❌ JSON錯誤：'+e.message,'err');return;}
  L('✅ 讀取成功','ok');

  const vehicles=data&&data.vehicle&&data.vehicle.stock||[];
  if(!vehicles.length){L('❌ 找不到車輛資料','err');return;}
  L('🏍️ 共 '+vehicles.length+' 筆車輛','info');

  // 清空舊資料
  const {error:dErr}=await sb.from('vehicles').delete().gt('id',0);
  if(dErr)L('⚠️ 清空失敗（繼續）：'+dErr.message,'info');
  else L('🗑️ 已清空舊資料','ok');

  let ok=0,fail=0;
  for(const v of vehicles){
    const row={
      name: v.name||'',
      date: v.date||null,
      plate: v.plate||'',
      year: v.year||null,
      mileage: v.mileage||'',
      cost: v.cost||0,
      price: v.price||0,
      note: v.note||'',
      inspect: v.inspect||null,
      prevName: v.prevName||'',
      prevPhone: v.prevPhone||'',
      parts: v.parts||[],
      photos: v.photos||[],
      status: v.status||'在庫',
    };
    if(!row.date)delete row.date;
    if(!row.inspect)delete row.inspect;
    const {error:iErr}=await sb.from('vehicles').insert(row);
    if(iErr){L('❌ '+v.name+'：'+iErr.message,'err');fail++;}
    else{L('✅ '+v.name+' ('+(v.plate||'無牌')+')','ok');ok++;}
  }
  L('\n結果：成功'+ok+'筆，失敗'+fail+'筆',ok>0?'ok':'err');
  if(ok>0)L('🎉 完成！請回到後台。','ok');
}
</script>
</body>
</html>
