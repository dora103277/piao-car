<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料匯入工具</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#fff0f3;padding:20px;max-width:600px;margin:0 auto;}
h1{color:#ff85a1;}
.card{background:#fff;border-radius:14px;border:2px solid #ffd6e0;padding:20px;margin-bottom:16px;}
button{background:linear-gradient(135deg,#ffb3c6,#ff85a1);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
#log{background:#1a1a1a;color:#0f0;border-radius:10px;padding:16px;font-size:12px;font-family:monospace;min-height:200px;white-space:pre-wrap;margin-top:16px;}
.ok{color:#0f0;} .err{color:#f55;} .info{color:#ff0;}
</style>
</head>
<body>
<h1>🔧 資料匯入工具</h1>

<div class="card">
  <div style="font-weight:700;margin-bottom:10px;">選擇備份檔案（整合備份_xxxx.json）</div>
  <input type="file" id="fileInput" accept=".json" style="width:100%;padding:10px;border:2px solid #ffd6e0;border-radius:10px;">
  <button onclick="runImport()">🚀 開始匯入</button>
</div>

<div id="log">等待匯入...</div>

<script>
const SU = 'https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const sb = supabase.createClient(SU, SK);

const log = document.getElementById('log');
function addLog(msg, type='info') {
  const span = document.createElement('span');
  span.className = type;
  span.textContent = msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

async function runImport() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('請選擇檔案'); return; }
  
  log.innerHTML = '';
  addLog('📂 讀取檔案...', 'info');
  
  const text = await file.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch(e) {
    addLog('❌ JSON 格式錯誤：' + e.message, 'err');
    return;
  }
  
  addLog('✅ 檔案讀取成功', 'ok');

  // 匯入在庫車輛
  if (data.vehicle && data.vehicle.stock) {
    const vehicles = data.vehicle.stock;
    addLog(`\n🏍️ 開始匯入 ${vehicles.length} 筆在庫車輛...`, 'info');
    
    // 先清空
    const { error: delErr } = await sb.from('vehicles').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    if (delErr) addLog('⚠️ 清空失敗（可能沒資料）：' + delErr.message, 'info');
    else addLog('✅ 已清空舊資料', 'ok');
    
    let ok = 0, fail = 0;
    for (const v of vehicles) {
      const { error } = await sb.from('vehicles').insert({ data: v });
      if (error) {
        addLog(`❌ ${v.name} 失敗：${error.message}`, 'err');
        fail++;
      } else {
        addLog(`✅ ${v.name} (${v.plate || '無牌'})`, 'ok');
        ok++;
      }
    }
    addLog(`\n車輛匯入完成：成功 ${ok} 筆，失敗 ${fail} 筆`, ok > 0 ? 'ok' : 'err');
  }

  addLog('\n🎉 全部完成！請關閉此頁面回到後台。', 'ok');
}
</script>
</body>
</html>
