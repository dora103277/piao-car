<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>後台管理 | 驃宇重車</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pk:#ff85a1;--pl:#fff0f3;--ps:#ffd6e0;--pm:#ffb3c6;--br:#6b3f2a;--rd:#e53935;--gn:#0a6624;--gl:#d1f7d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pl);min-height:100vh;}
.tb{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.tb img{width:32px;height:32px;border-radius:6px;object-fit:cover;flex-shrink:0;}
.tb h1{color:#fff;font-size:16px;font-weight:700;}
.tb p{color:var(--rd);font-size:9px;letter-spacing:1px;}
.tb-right{margin-left:auto;}
.tb-right button{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:16px;cursor:pointer;}
#home{padding:12px 12px 60px;}
.sc-banner{background:linear-gradient(135deg,var(--pm),var(--pk));border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 6px 20px rgba(255,133,161,.3);position:relative;overflow:hidden;}
.sc-banner::before{content:'🌸';font-size:70px;position:absolute;right:-8px;top:-10px;opacity:.12;}
.sc-banner h2{color:#fff;font-size:12px;margin-bottom:10px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.si{background:rgba(255,255,255,.2);border-radius:10px;padding:10px;}
.si .n{color:#fff;font-size:20px;font-weight:900;}
.si .l{color:rgba(255,255,255,.8);font-size:10px;margin-top:1px;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mc{background:#fff;border-radius:14px;border:2px solid var(--ps);padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.mc:hover{border-color:var(--pk);transform:translateY(-2px);}
.mc .mi{font-size:26px;margin-bottom:6px;}
.mc .ml{font-size:11px;font-weight:700;color:var(--br);}
.bdg{position:absolute;top:8px;right:8px;background:var(--rd);color:#fff;border-radius:8px;padding:1px 6px;font-size:9px;font-weight:700;}
.sec{display:none;padding:12px 12px 60px;}
.sec.on{display:block;}
.bk{display:inline-flex;align-items:center;gap:5px;background:var(--pl);border:2px solid var(--ps);border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--pk);cursor:pointer;margin-bottom:12px;font-family:'Noto Sans TC',sans-serif;}
.st{font-size:12px;font-weight:900;color:var(--br);margin:12px 0 8px;display:flex;align-items:center;gap:6px;}
.st::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--pm),transparent);border-radius:2px;}
.ld{text-align:center;padding:40px 20px;color:#ccc;font-size:13px;}
.card{background:#fff;border-radius:14px;border:2px solid var(--ps);padding:13px;margin-bottom:10px;}
.tbl{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border-radius:12px;overflow:hidden;border:2px solid var(--ps);}
.tbl th{background:linear-gradient(135deg,var(--pl),#fff);padding:8px 6px;text-align:left;color:var(--br);font-weight:700;border-bottom:2px solid var(--ps);}
.tbl td{padding:7px 6px;border-bottom:1px solid #f8f0f2;color:#555;vertical-align:top;}
.tbl tr:last-child td{border:none;}
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--br);margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--ps);background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--br);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--pk);}
.fg textarea{resize:vertical;min-height:70px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rm{width:26px;height:26px;border-radius:50%;background:#ffeeee;border:none;color:var(--rd);font-size:14px;cursor:pointer;flex-shrink:0;}
.add-row{width:100%;padding:8px;background:var(--pl);border:2px dashed var(--ps);border-radius:9px;font-size:11px;font-weight:700;color:var(--pk);cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:10px;}
.sum{background:var(--pl);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.sr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.sr .k{color:#aaa;}.sr .v{font-weight:700;color:var(--br);}
.sr.big{border-top:1px solid var(--ps);margin-top:5px;padding-top:6px;}
.sr.big .v{font-size:15px;color:var(--pk);}
.btn{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-p{background:linear-gradient(135deg,var(--pm),var(--pk));color:#fff;}
.btn-f{width:100%;padding:13px;background:linear-gradient(135deg,var(--pm),var(--pk));color:#fff;border:none;border-radius:14px;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:6px;}
.bs{padding:5px 10px;border-radius:7px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.be{background:#e8f4ff;color:#1456a0;}.bd{background:#ffeeee;color:var(--rd);}.bc{background:var(--gl);color:var(--gn);}.by{background:#fff8e1;color:#856404;}
.pill{border-radius:16px;padding:2px 9px;font-size:10px;font-weight:700;}
.pg{background:var(--gl);color:var(--gn);}.py{background:#fff3cd;color:#856404;}.pr{background:#ffeeee;color:var(--rd);}.pgr{background:#eee;color:#888;}.pb{background:#d0e8ff;color:#1456a0;}
.sb{background:#fff;border-radius:10px;border:2px solid var(--ps);padding:9px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sb input{flex:1;border:none;outline:none;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--br);}
.ft{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.ft::-webkit-scrollbar{display:none;}
.fp{white-space:nowrap;padding:5px 12px;border-radius:14px;font-size:10px;font-weight:700;cursor:pointer;background:#fff;border:2px solid var(--ps);color:#aaa;}
.fp.on{background:var(--pk);border-color:var(--pk);color:#fff;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;}
.ov.on{display:flex;}
.sh{background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 44px;width:100%;max-height:92vh;overflow-y:auto;animation:su .3s ease;position:relative;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-h{width:36px;height:4px;background:#eee;border-radius:2px;margin:0 auto 16px;}
.sh-x{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:#ccc;}
.sh h2{font-size:16px;font-weight:900;color:var(--br);margin-bottom:14px;}
.prog{background:var(--ps);border-radius:5px;height:7px;overflow:hidden;margin:6px 0;}
.pf{height:100%;background:linear-gradient(90deg,var(--pm),var(--pk));border-radius:5px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--br);color:#fff;padding:10px 20px;border-radius:20px;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.on{opacity:1;}
.chip{display:inline-flex;align-items:center;background:var(--pl);border-radius:7px;padding:2px 7px;font-size:10px;color:#c9667c;margin:1px 2px 0 0;}
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.photo-item{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;}
.photo-item img{width:100%;height:100%;object-fit:cover;}
.photo-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;}
.photo-add{width:80px;height:80px;border:2px dashed var(--ps);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:#fff;}
.ai-btn{background:linear-gradient(135deg,#e8f4ff,#d0e8ff);border:2px solid #b0d4f0;border-radius:12px;padding:14px;text-align:center;cursor:pointer;margin-bottom:12px;}
</style>
</head>
<body>
<div class="tb">
  <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.display='none'">
  <div><h1>後台管理</h1><p>PIAO YU. 秘書/老闆</p></div>
  <div class="tb-right"><button onclick="openTheme()">🎨</button></div>
</div>

<div id="home">
  <div class="sc-banner">
    <h2>📊 即時概覽</h2>
    <div class="sg">
      <div class="si"><div class="n" id="sV">-</div><div class="l">在庫車輛</div></div>
      <div class="si"><div class="n" id="sB">-</div><div class="l">待處理預約</div></div>
      <div class="si"><div class="n" id="sR">-</div><div class="l">庫存待確認</div></div>
      <div class="si"><div class="n" id="sI">-</div><div class="l">進行中尾款</div></div>
    </div>
  </div>
  <div class="mg">
    <div class="mc" onclick="go('req')"><div class="mi">⚠️</div><div class="ml">庫存申請確認</div><div class="bdg" id="bR">0</div></div>
    <div class="mc" onclick="go('veh')"><div class="mi">🏍️</div><div class="ml">車輛管理</div></div>
    <div class="mc" onclick="go('sold')"><div class="mi">💰</div><div class="ml">售出記錄</div></div>
    <div class="mc" onclick="go('bk')"><div class="mi">📋</div><div class="ml">所有預約</div></div>
    <div class="mc" onclick="go('inst')"><div class="mi">💳</div><div class="ml">尾款管理</div></div>
    <div class="mc" onclick="go('maint')"><div class="mi">🔧</div><div class="ml">保養記錄</div></div>
    <div class="mc" onclick="go('inv')"><div class="mi">📦</div><div class="ml">零件庫存</div></div>
    <div class="mc" onclick="go('exp')"><div class="mi">💸</div><div class="ml">其他支出</div></div>
    <div class="mc" onclick="go('rpt')"><div class="mi">📊</div><div class="ml">月報表</div></div>
    <div class="mc" onclick="go('hist')"><div class="mi">🔍</div><div class="ml">車輛履歷</div></div>
    <div class="mc" onclick="go('insp')"><div class="mi">📅</div><div class="ml">定檢提醒</div></div>
    <div class="mc" onclick="go('mbr')"><div class="mi">👥</div><div class="ml">會員管理</div></div>
  </div>
</div>

<div class="sec" id="sec-req"></div>
<div class="sec" id="sec-veh"></div>
<div class="sec" id="sec-sold"></div>
<div class="sec" id="sec-bk"></div>
<div class="sec" id="sec-inst"></div>
<div class="sec" id="sec-maint"></div>
<div class="sec" id="sec-inv"></div>
<div class="sec" id="sec-exp"></div>
<div class="sec" id="sec-rpt"></div>
<div class="sec" id="sec-hist"></div>
<div class="sec" id="sec-insp"></div>
<div class="sec" id="sec-mbr"></div>

<div class="ov" id="ov" onclick="cOv(event)">
  <div class="sh"><div class="sh-h"></div><span class="sh-x" onclick="xOv()">✕</span><div id="shc"></div></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="photoPick" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">

<script>
const SU = 'https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const LIFF = '2009926811-e1vXaP7l';
const sb = supabase.createClient(SU, SK);

let uid = '', role = '';
let editVid = null, allV = [], allP = [], allM = [];
let vParts = [], mItems = [], mComm = [], soldComm = [];
let currentPhotos = [];
let allRptData = { maint: [], exp: [], sold: [] };

// ── 初始化 ──
async function init() {
  try {
    await liff.init({ liffId: LIFF });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    uid = p.userId;
    const { data: m } = await sb.from('members').select('role').eq('line_user_id', uid).single();
    if (!m || (m.role !== 'secretary' && m.role !== 'boss')) {
      document.getElementById('home').innerHTML = '<div class="ld">🔒 僅秘書/老闆可使用</div>';
      return;
    }
    role = m.role;
  } catch (e) {
    console.log('LIFF:', e.message);
    role = 'boss';
  }
  loadStats();
}

async function loadStats() {
  const [v, b, r, i] = await Promise.all([
    sb.from('vehicles').select('*', { count: 'exact', head: true }).eq('status', '在庫'),
    sb.from('bookings').select('*', { count: 'exact', head: true }).eq('status', '待確認'),
    sb.from('inventory_requests').select('*', { count: 'exact', head: true }).eq('status', '待確認'),
    sb.from('installments').select('*', { count: 'exact', head: true }).eq('status', '繳款中'),
  ]);
  document.getElementById('sV').textContent = v.count || 0;
  document.getElementById('sB').textContent = b.count || 0;
  document.getElementById('sR').textContent = r.count || 0;
  document.getElementById('sI').textContent = i.count || 0;
  document.getElementById('bR').textContent = r.count || 0;
}

function go(s) {
  document.getElementById('home').style.display = 'none';
  document.querySelectorAll('.sec').forEach(x => x.classList.remove('on'));
  document.getElementById('sec-' + s).classList.add('on');
  const fns = { req: lReq, veh: lVeh, sold: lSold, bk: lBk, inst: lInst, maint: lMaint, inv: lInv, exp: lExp, rpt: lRpt, hist: lHist, insp: lInsp, mbr: lMbr };
  if (fns[s]) fns[s]();
}

function back() {
  document.querySelectorAll('.sec').forEach(x => x.classList.remove('on'));
  document.getElementById('home').style.display = 'block';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

function oOv(h) {
  document.getElementById('shc').innerHTML = h;
  document.getElementById('ov').classList.add('on');
}

function cOv(e) {
  if (e.target === document.getElementById('ov')) xOv();
}

function xOv() {
  document.getElementById('ov').classList.remove('on');
}

// ── 主題色 ──
function openTheme() {
  oOv('<h2>🎨 選擇主題色</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">' +
    '<div onclick="setTheme(\'pink\')" style="background:linear-gradient(135deg,#ffb3c6,#ff85a1);border-radius:14px;padding:20px;text-align:center;cursor:pointer;"><div style="font-size:20px;margin-bottom:6px;">🌸</div><div style="color:#fff;font-weight:700;font-size:13px;">粉紅（預設）</div></div>' +
    '<div onclick="setTheme(\'blue\')" style="background:linear-gradient(135deg,#8ab8e8,#5b9bd5);border-radius:14px;padding:20px;text-align:center;cursor:pointer;"><div style="font-size:20px;margin-bottom:6px;">💙</div><div style="color:#fff;font-weight:700;font-size:13px;">淺藍</div></div>' +
    '<div onclick="setTheme(\'dark\')" style="background:linear-gradient(135deg,#2d2d3e,#1e1e2e);border-radius:14px;padding:20px;text-align:center;cursor:pointer;border:2px solid #ff85a1;"><div style="font-size:20px;margin-bottom:6px;">🌙</div><div style="color:#ff85a1;font-weight:700;font-size:13px;">深色+粉</div></div>' +
    '<div onclick="setTheme(\'green\')" style="background:linear-gradient(135deg,#7ecba6,#4caf82);border-radius:14px;padding:20px;text-align:center;cursor:pointer;"><div style="font-size:20px;margin-bottom:6px;">🌿</div><div style="color:#fff;font-weight:700;font-size:13px;">清新綠</div></div>' +
    '</div>');
}

function setTheme(name) {
  const themes = {
    pink: { pk: '#ff85a1', pl: '#fff0f3', ps: '#ffd6e0', pm: '#ffb3c6' },
    blue: { pk: '#5b9bd5', pl: '#eef5ff', ps: '#b8d4f0', pm: '#8ab8e8' },
    dark: { pk: '#ff85a1', pl: '#1e1e2e', ps: '#2d2d3e', pm: '#ff6b8e' },
    green: { pk: '#4caf82', pl: '#edfaf4', ps: '#b2e8d0', pm: '#7ecba6' },
  };
  const t = themes[name];
  if (!t) return;
  const r = document.documentElement.style;
  r.setProperty('--pk', t.pk);
  r.setProperty('--pl', t.pl);
  r.setProperty('--ps', t.ps);
  r.setProperty('--pm', t.pm);
  xOv();
  toast('✅ 主題已更換');
}

// ── 庫存申請 ──
async function lReq() {
  const el = document.getElementById('sec-req');
  el.innerHTML = '<button class="bk" onclick="back()">← 返回</button><div class="st">庫存申請確認</div><div id="rl"><div class="ld">載入中…</div></div>';
  const { data } = await sb.from('inventory_requests').select('*').order('created_at', { ascending: false });
  const list = data || [];
  const pending = list.filter(r => r.status === '待確認');
  const done = list.filter(r => r.status !== '待確認');
  const sc = { '待確認': 'py', '已確認': 'pg', '已拒絕': 'pr' };
  let h = pending.length ? pending.map(r =>
    '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
    '<span style="font-size:12px;font-weight:900;color:var(--br);">🔧 ' + (r.vehicle_name || '—') + (r.plate ? ' (' + r.plate + ')' : '') + '</span>' +
    '<span class="pill ' + (sc[r.status] || 'pgr') + '">' + r.status + '</span></div>' +
    '<div style="font-size:11px;color:#666;margin-bottom:5px;">👔 ' + (r.technician_name || '—') + ' · ' + new Date(r.created_at).toLocaleDateString('zh-TW') + '</div>' +
    '<div style="border-top:1px solid var(--ps);padding-top:6px;">' +
    (r.items || []).map(i => '<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;padding:2px 0;"><span>' + i.name + '</span><span>×' + (i.quantity || 1) + '</span></div>').join('') +
    '</div><div style="display:flex;gap:6px;margin-top:8px;">' +
    '<button class="bs bc" onclick="confRq(\'' + r.id + '\')">✓ 確認扣庫存</button>' +
    '<button class="bs bd" onclick="rejRq(\'' + r.id + '\')">✕ 拒絕</button></div></div>'
  ).join('') : '<div class="ld" style="padding:20px;">沒有待確認 ✅</div>';
  if (done.length) {
    h += '<div class="st">已處理</div>' + done.slice(0, 5).map(r =>
      '<div class="card" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;">' +
      '<span style="font-size:12px;font-weight:700;color:var(--br);">🔧 ' + (r.vehicle_name || '—') + '</span>' +
      '<span class="pill ' + (sc[r.status] || 'pgr') + '">' + r.status + '</span></div></div>'
    ).join('');
  }
  document.getElementById('rl').innerHTML = h;
}

async function confRq(id) {
  const { data: r } = await sb.from('inventory_requests').select('*').eq('id', id).single();
  for (const item of (r.items || [])) {
    const { data: p } = await sb.from('parts_inventory').select('*').ilike('name', '%' + item.name + '%').single();
    if (p) await sb.from('parts_inventory').update({ box_quantity: Math.max(0, (p.box_quantity || 0) - (item.quantity || 1)) }).eq('id', p.id);
  }
  await sb.from('inventory_requests').update({ status: '已確認', confirmed_by: uid, confirmed_at: new Date().toISOString() }).eq('id', id);
  if (r.maintenance_id) await sb.from('vehicle_maintenance').update({ status: '已完成' }).eq('id', r.maintenance_id);
  toast('✅ 庫存已扣除');
  lReq();
  loadStats();
}

async function rejRq(id) {
  await sb.from('inventory_requests').update({ status: '已拒絕' }).eq('id', id);
  toast('已拒絕');
  lReq();
}

// ── 車輛管理 ──
async function lVeh() {
  document.getElementById('sec-veh').innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
    '<button class="bk" onclick="back()" style="margin:0;">← 返回</button>' +
    '<button class="btn btn-p" onclick="openAddV()">＋ 新增車輛</button></div>' +
    '<div class="sb"><span>🔍</span><input type="text" id="vs" placeholder="搜尋車名、車牌…" oninput="fV()"></div>' +

let vSt = '在庫';

async function lvl(s, el) {
  vSt = s;
  if (el) {
    document.querySelectorAll('#sec-veh .fp').forEach(t => t.classList.remove('on'));
    el.classList.add('on');
  }
  let q = sb.from('vehicles').select('*').order('entry_date', { ascending: false });
  if (s !== 'all') q = q.eq('status', s);
  const { data } = await q;
  allV = data || [];
  fV();
}

function fV() {
  const q = (document.getElementById('vs') ? document.getElementById('vs').value : '').toLowerCase();
  rvl(q ? allV.filter(v => (v.name || '').toLowerCase().includes(q) || (v.plate || '').toLowerCase().includes(q)) : allV);
}

function rvl(list) {
  if (!list.length) { document.getElementById('vl').innerHTML = '<div class="ld">沒有車輛</div>'; return; }
  document.getElementById('vl').innerHTML = list.map(v => {
    const parts = v.parts || [];
    const pt = parts.reduce((s, p) => s + (parseInt(p.amount) || 0), 0);
    const tc = (v.cost || 0) + pt;
    const profit = (v.price || 0) - tc;
    const sc = v.status === '在庫' ? 'pg' : v.status === '已售出' ? 'pgr' : 'py';
    const photos = v.photos || [];
    return '<div class="card">' +
      (photos.length ? '<div style="display:flex;gap:5px;overflow-x:auto;margin-bottom:10px;">' + photos.map(p => '<img src="' + p + '" style="width:80px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">').join('') + '</div>' : '') +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
      '<span style="font-size:14px;font-weight:900;color:var(--br);">🏍️ ' + v.name + '</span>' +
      '<span class="pill ' + sc + '">' + v.status + '</span></div>' +
      '<table style="width:100%;font-size:11px;border-collapse:collapse;">' +
      '<tr><td style="color:#aaa;padding:3px 0;width:40%;">進車日期</td><td style="font-weight:700;color:var(--br);">' + (v.entry_date || (v.created_at ? v.created_at.split('T')[0] : '—')) + '</td></tr>' +
      '<tr><td style="color:#aaa;padding:3px 0;">年份</td><td style="font-weight:700;color:var(--br);">' + (v.year || '—') + '年</td></tr>' +
      '<tr><td style="color:#aaa;padding:3px 0;">里程</td><td style="font-weight:700;color:var(--br);">' + (v.mileage ? v.mileage.toLocaleString() + 'km' : '—') + '</td></tr>' +
      '<tr><td style="color:#aaa;padding:3px 0;">車牌</td><td style="font-weight:700;color:var(--br);">' + (v.plate || '—') + '</td></tr>' +
      '<tr><td style="color:#aaa;padding:3px 0;">售價</td><td style="font-weight:700;color:var(--pk);">' + (v.price ? 'NT$ ' + v.price.toLocaleString() : '未設定') + '</td></tr>' +
      '<tr><td style="color:#aaa;padding:3px 0;">成本</td><td style="font-weight:700;color:var(--br);">NT$ ' + (v.cost || 0).toLocaleString() + '</td></tr>' +
      (parts.length ? '<tr><td style="color:#aaa;padding:3px 0;">耗材</td><td style="font-weight:700;color:var(--br);">' + parts.map(p => p.name + ' $' + (p.amount || 0)).join('<br>') + '</td></tr>' : '') +
      '<tr><td style="color:#aaa;padding:3px 0;">總成本</td><td style="font-weight:700;color:var(--br);">NT$ ' + tc.toLocaleString() + '</td></tr>' +
      (v.price ? '<tr><td style="color:#aaa;padding:3px 0;">毛利</td><td style="font-weight:900;color:' + (profit >= 0 ? 'var(--gn)' : 'var(--rd)') + ';">NT$ ' + profit.toLocaleString() + '</td></tr>' : '') +
      (v.next_inspection ? '<tr><td style="color:#aaa;padding:3px 0;">定檢</td><td style="font-weight:700;color:var(--br);">' + new Date(v.next_inspection).toLocaleDateString('zh-TW') + '</td></tr>' : '') +
      (v.description ? '<tr><td style="color:#aaa;padding:3px 0;">備註</td><td style="font-weight:700;color:var(--br);">' + v.description + '</td></tr>' : '') +
      '</table>' +
      '<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">' +
      '<button class="bs be" onclick="editV(\'' + v.id + '\')">✏️ 編輯</button>' +
      (v.status === '在庫' ? '<button class="bs by" onclick="openSoldV(\'' + v.id + '\')">💰 售出</button><button class="bs bc" onclick="updInsp(\'' + v.id + '\',\'' + (v.next_inspection || '') + '\')">📅 定檢</button>' : '') +
      '<button class="bs bd" onclick="delV(\'' + v.id + '\',\'' + v.name.replace(/'/g, "\\'") + '\')">🗑️</button>' +
      '</div></div>';
  }).join('');
}

function openAiInput() {
  oOv('<h2>✨ AI 文字輸入</h2>' +
    '<div style="font-size:11px;color:#666;background:var(--pl);border-radius:10px;padding:10px;margin-bottom:12px;">貼上車輛描述，自動解析填入欄位<br><span style="color:#aaa;font-size:10px;">格式：車輛：HONDA CBR600RR / 年份：2016 / 里程：32xxx / 售價：33.8萬 / 改裝：配備...</span></div>' +
    '<div class="fg"><label>貼上車輛描述</label><textarea id="ai-text" rows="8" placeholder="直接貼上整段文字…" style="font-size:12px;line-height:1.6;"></textarea></div>' +
    '<button class="btn-f" onclick="runAi()">✨ 解析並填入</button>' +
    '<div id="ai-status" style="margin-top:8px;"></div>');
}

function runAi() {
  const textEl = document.getElementById('ai-text');
  if (!textEl) return;
  const text = textEl.value.trim();
  if (!text) { alert('請貼上車輛描述'); return; }
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const result = { name: '', year: null, mileage: 0, plate: '', price: null, cost: null, description: '', parts: [] };
  const descLines = [];
  for (const line of lines) {
    const lower = line.toLowerCase();
    if (lower.startsWith('車輛：') || lower.startsWith('車款：')) result.name = line.replace(/^車輛：|^車款：/, '').trim();
    else if (lower.startsWith('年份：') || lower.startsWith('年份:')) result.year = parseInt(line.replace(/^年份[：:]/, '').trim()) || null;
    else if (lower.startsWith('里程：') || lower.startsWith('里程:')) { const m = line.replace(/^里程[：:]/, '').trim().replace(/xxx+/gi, '0').replace(/[^0-9]/g, ''); result.mileage = parseInt(m) || 0; }
    else if (lower.startsWith('車牌：') || lower.startsWith('車牌:')) result.plate = line.replace(/^車牌[：:]/, '').trim();
    else if (lower.startsWith('售價：') || lower.startsWith('售價:')) { const p = line.replace(/^售價[：:]/, '').trim(); const w = p.match(/(\d+\.?\d*)萬/); result.price = w ? Math.round(parseFloat(w[1]) * 10000) : (parseInt(p.replace(/[^0-9]/g, '')) || null); }
    else if (lower.startsWith('成本：') || lower.startsWith('進車：')) { const p = line.replace(/^成本[：:]|^進車[：:]/, '').trim(); const w = p.match(/(\d+\.?\d*)萬/); result.cost = w ? Math.round(parseFloat(w[1]) * 10000) : (parseInt(p.replace(/[^0-9]/g, '')) || null); }
    else if (lower.startsWith('備註：') || lower.startsWith('備註:')) result.description = line.replace(/^備註[：:]/, '').trim();
    else if (lower.startsWith('改裝：') || lower.startsWith('改裝:') || lower.startsWith('配備：')) {
      line.replace(/^改裝[：:]|^配備[：:]/, '').trim().split(/[\s、，,]+/).filter(m => m.length > 1).forEach(m => result.parts.push({ name: m.trim(), amount: 0 }));
    }
    else if (line.length > 1) descLines.push(line);
  }
  if (!result.description && descLines.length) result.description = descLines.join('\n');
  if (!result.name && lines.length) result.name = lines[0];

  // 填入欄位
  if (result.name && document.getElementById('vn')) document.getElementById('vn').value = result.name;
  if (result.year && document.getElementById('vy')) document.getElementById('vy').value = result.year;
  if (result.mileage && document.getElementById('vm')) document.getElementById('vm').value = result.mileage;
  if (result.plate && document.getElementById('vp')) document.getElementById('vp').value = result.plate;
  if (result.price && document.getElementById('vpr')) document.getElementById('vpr').value = result.price;
  if (result.cost && document.getElementById('vco')) document.getElementById('vco').value = result.cost;
  if (result.description && document.getElementById('vno')) document.getElementById('vno').value = result.description;
  if (result.parts.length) { vParts = result.parts; }

  xOv();
  setTimeout(() => {
    renderVParts();
    calcVTotal();
    const ais = document.getElementById('ais');
    if (ais) ais.innerHTML = '<div style="background:var(--gl);border-radius:8px;padding:8px 10px;font-size:11px;color:var(--gn);margin-bottom:10px;">✅ 解析完成！請確認並補充欄位</div>';
  }, 200);
  toast('✅ 解析完成！');
}

function renderPhotoGrid() {
  const g = document.getElementById('photoGrid');
  if (!g) return;
  g.innerHTML = currentPhotos.map((p, i) =>
    '<div class="photo-item"><img src="' + p + '"><button class="photo-rm" onclick="currentPhotos.splice(' + i + ',1);renderPhotoGrid()">×</button></div>'
  ).join('') + '<div class="photo-add" onclick="document.getElementById(\'photoPick\').click()">＋</div>';
}

function addPhotos(ev) {
  Array.from(ev.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = e => { currentPhotos.push(e.target.result); renderPhotoGrid(); };
    r.readAsDataURL(f);
  });
  ev.target.value = '';
}

function renderVParts() {
  const el = document.getElementById('vparts');
  if (!el) return;
  el.innerHTML = vParts.map((p, i) =>
    '<div style="display:flex;gap:5px;margin-bottom:6px;align-items:center;">' +
    '<input type="text" value="' + (p.name || '') + '" placeholder="耗材名稱" onchange="vParts[' + i + '].name=this.value" style="flex:2;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<input type="number" value="' + (p.amount || '') + '" placeholder="金額" onchange="vParts[' + i + '].amount=parseInt(this.value)||0;calcVTotal()" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<input type="text" value="' + (p.note || '') + '" placeholder="備註" onchange="vParts[' + i + '].note=this.value" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<button class="rm" onclick="vParts.splice(' + i + ',1);renderVParts();calcVTotal()">×</button></div>'
  ).join('');
}

function addVPart() { vParts.push({ name: '', amount: 0, note: '' }); renderVParts(); }

function calcVTotal() {
  const cost = parseInt(document.getElementById('vco') ? document.getElementById('vco').value : 0) || 0;
  const pt = vParts.reduce((s, p) => s + (parseInt(p.amount) || 0), 0);
  const ec = id => document.getElementById(id);
  if (ec('vs-c')) ec('vs-c').textContent = 'NT$ ' + cost.toLocaleString();
  if (ec('vs-p')) ec('vs-p').textContent = 'NT$ ' + pt.toLocaleString();
  if (ec('vs-t')) ec('vs-t').textContent = 'NT$ ' + (cost + pt).toLocaleString();
}

async function saveV() {
  const name = document.getElementById('vn').value.trim();
  if (!name) { alert('請填寫車輛名稱'); return; }
  const d = {
    name,
    entry_date: document.getElementById('vd').value || null,
    plate: document.getElementById('vp').value.trim(),
    year: parseInt(document.getElementById('vy').value) || null,
    mileage: parseInt(document.getElementById('vm').value) || 0,
    cost: parseInt(document.getElementById('vco').value) || 0,
    price: parseInt(document.getElementById('vpr').value) || 0,
    next_inspection: document.getElementById('vi').value || null,
    prev_owner_name: document.getElementById('von').value.trim(),
    prev_owner_phone: document.getElementById('vop').value.trim(),
    description: document.getElementById('vno').value.trim(),
    parts: vParts,
    photos: currentPhotos,
    status: '在庫',
  };
  let err;
  if (editVid) { ({ error: err } = await sb.from('vehicles').update(d).eq('id', editVid)); }
  else { ({ error: err } = await sb.from('vehicles').insert(d)); }
  if (err) { alert('失敗：' + err.message); return; }
  xOv();
  toast(editVid ? '✅ 已更新' : '✅ 已新增');
  await lvl(vSt, null);
}

async function delV(id, name) {
  if (!confirm('確定刪除「' + name + '」？')) return;
  await sb.from('vehicles').delete().eq('id', id);
  toast('已刪除');
  await lvl(vSt, null);
}

function renderSoldComm() {
  const el = document.getElementById('scomm');
  if (!el) return;
  el.innerHTML = soldComm.map((c, i) =>
    '<div style="display:flex;gap:5px;margin-bottom:6px;align-items:center;">' +
    '<input type="text" value="' + (c.to || '') + '" placeholder="給誰" onchange="soldComm[' + i + '].to=this.value" style="flex:2;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<input type="number" value="' + (c.amount || '') + '" placeholder="金額" onchange="soldComm[' + i + '].amount=parseInt(this.value)||0;calcSold()" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<button class="rm" onclick="soldComm.splice(' + i + ',1);renderSoldComm()">×</button></div>'
  ).join('');
}

function addSoldComm() { soldComm.push({ to: '', amount: 0 }); renderSoldComm(); }

function calcSold(totalCost) {
  const inc = parseInt(document.getElementById('si') ? document.getElementById('si').value : 0) || 0;
  const comm = soldComm.reduce((s, c) => s + (c.amount || 0), 0);
  const profit = inc - (totalCost || 0) - comm;
  const ec = id => document.getElementById(id);
  if (ec('sc-in')) ec('sc-in').textContent = 'NT$ ' + inc.toLocaleString();
  if (ec('sc-cm')) ec('sc-cm').textContent = 'NT$ ' + comm.toLocaleString();
  if (ec('sc-p')) { ec('sc-p').textContent = 'NT$ ' + profit.toLocaleString(); ec('sc-p').style.color = profit >= 0 ? 'var(--gn)' : 'var(--rd)'; }
}

async function confirmSold(id, totalCost) {
  const v = allV.find(x => x.id === id);
  const sellPrice = parseInt(document.getElementById('si').value) || 0;
  await sb.from('vehicles').update({ status: '已售出' }).eq('id', id);
  await sb.from('vehicle_sold').insert({
    vehicle_name: v ? v.name : '',
    plate: v ? (v.plate || '') : '',
    year: v ? v.year : null,
    mileage: parseInt(document.getElementById('sm').value) || 0,
    vehicle_cost: v ? (v.cost || 0) : 0,
    sell_price: sellPrice,
    sell_date: document.getElementById('sd').value,
    buyer_name: document.getElementById('sn').value.trim(),
    buyer_phone: document.getElementById('sp').value.trim(),
    transfer_note: document.getElementById('se').value.trim(),
    notes: document.getElementById('sno').value.trim(),
    expenses: v ? (v.parts || []) : [],
    commissions: soldComm,
  });
  xOv();
  toast('✅ 已標記售出');
  await lvl(vSt, null);
}

function updInsp(id, current) {
  const v = allV.find(x => x.id === id);
  oOv('<h2>📅 更新定檢日期</h2>' +

    '<div style="font-size:11px;color:#aaa;margin-bottom:12px;">目前：' + (current ? new Date(current).toLocaleDateString('zh-TW') : '未設定') + '</div>' +

function setIO(m) {
  const b = document.getElementById('nd').value || new Date().toISOString().split('T')[0];
  const d = new Date(b);
  d.setMonth(d.getMonth() + m);
  document.getElementById('nd').value = d.toISOString().split('T')[0];
}

async function saveInsp(id) {
  const d = document.getElementById('nd').value;

  await sb.from('vehicles').update({ next_inspection: d }).eq('id', id);
  xOv();

}

async function lBk() {
  document.getElementById('sec-bk').innerHTML = '<button class="bk" onclick="back()">← 返回</button>' +
    '<div class="ft"><div class="fp on" onclick="lbk(\'all\',this)">全部</div><div class="fp" onclick="lbk(\'待確認\',this)">待確認</div>' +

async function lbk(s, el) {
  if (el) { document.querySelectorAll('#sec-bk .fp').forEach(t => t.classList.remove('on')); el.classList.add('on'); }
  let q = sb.from('bookings').select('*').order('booking_date', { ascending: false });
  if (s !== 'all') q = q.eq('status', s);
  const { data } = await q;
  const sc = { '待確認': 'py', '已確認': 'pg', '已完成': 'pb', '已取消': 'pgr' };
  document.getElementById('bl').innerHTML = (data || []).map(b =>
    '<div class="card" style="margin-bottom:10px;">' +
    '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
    '<span style="font-size:12px;font-weight:900;color:var(--br);">' + (b.booking_type === '保養' ? '🔧' : '🏍️') + ' ' + (b.vehicle_name || '未指定') + '｜' + b.booking_type + '</span>' +
    '<span class="pill ' + (sc[b.status] || 'pgr') + '">' + b.status + '</span></div>' +
    '<div style="font-size:11px;color:#666;">📅 ' + b.booking_date + ' 🕐 ' + b.booking_time + '</div>' +
    '<div style="font-size:11px;color:#666;margin-top:2px;">👤 ' + b.customer_name + ' 📞 ' + b.phone + '</div>' +
    (b.notes ? '<div style="font-size:10px;color:#aaa;margin-top:4px;">💬 ' + b.notes + '</div>' : '') +
    (b.status !== '已取消' && b.status !== '已完成' ?
      '<div style="display:flex;gap:5px;margin-top:8px;">' +
      (b.status === '待確認' ? '<button class="bs bc" onclick="upB(\'' + b.id + '\',\'已確認\')">確認</button>' : '') +
      '<button class="bs bd" onclick="upB(\'' + b.id + '\',\'已取消\')">取消</button>' +
      (b.status === '已確認' ? '<button class="bs be" onclick="upB(\'' + b.id + '\',\'已完成\')">完成</button>' : '') +
      '</div>' : '') +
    '</div>'
  ).join('') || '<div class="ld">沒有預約</div>';
}

async function upB(id, status) {
  await sb.from('bookings').update({ status }).eq('id', id);
  lbk('all', null);
}

    '<button class="rm" onclick="mItems.splice(' + idx + ',1);renderMItems();calcM()">×</button></div>'
  ).join('');

function selPart(idx, sel) {
  const opt = sel.selectedOptions[0];
  if (opt && opt.value) {
    mItems[idx].parts = opt.value;
    mItems[idx].cost = parseInt(opt.dataset.cost) || 0;
    mItems[idx].charge = parseInt(opt.dataset.price) || 0;
    renderMItems();
    calcM();
  }
}

function renderMComm() {
  const el = document.getElementById('mcomm');
  if (!el) return;
  el.innerHTML = mComm.map((c, i) =>
    '<div style="display:flex;gap:5px;margin-bottom:6px;align-items:center;">' +
    '<input type="text" value="' + (c.to || '') + '" placeholder="給誰" onchange="mComm[' + i + '].to=this.value" style="flex:2;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<input type="number" value="' + (c.amount || '') + '" placeholder="金額" onchange="mComm[' + i + '].amount=parseInt(this.value)||0;calcM()" style="flex:1;padding:8px;border-radius:8px;border:2px solid var(--ps);font-size:11px;outline:none;">' +
    '<button class="rm" onclick="mComm.splice(' + i + ',1);renderMComm();calcM()">×</button></div>'
  ).join('');
}

function addMItem() { mItems.push({ name: '', parts: '', charge: 0, cost: 0 }); renderMItems(); }
function addMComm() { mComm.push({ to: '', amount: 0 }); renderMComm(); }

function calcM() {
  const tc = mItems.reduce((s, i) => s + (i.charge || 0), 0);
  const tco = mItems.reduce((s, i) => s + (i.cost || 0), 0);
  const tcomm = mComm.reduce((s, c) => s + (c.amount || 0), 0);
  const ec = id => document.getElementById(id);
  if (ec('m-c')) ec('m-c').textContent = 'NT$ ' + tc.toLocaleString();
  if (ec('m-co')) ec('m-co').textContent = 'NT$ ' + tco.toLocaleString();
  if (ec('m-cm')) ec('m-cm').textContent = 'NT$ ' + tcomm.toLocaleString();
  if (ec('m-p')) ec('m-p').textContent = 'NT$ ' + (tc - tco - tcomm).toLocaleString();
}

async function saveMaint() {
  const name = document.getElementById('mn').value.trim();
  if (!name) { alert('請填寫車輛名稱'); return; }
  const tc = mItems.reduce((s, i) => s + (i.charge || 0), 0);
  const tco = mItems.reduce((s, i) => s + (i.cost || 0), 0);
  const tcomm = mComm.reduce((s, c) => s + (c.amount || 0), 0);
  for (const item of mItems) {
    if (item.parts) {
      const { data: p } = await sb.from('parts_inventory').select('*').eq('id', item.parts).single();
      if (p) await sb.from('parts_inventory').update({ box_quantity: Math.max(0, (p.box_quantity || 0) - 1) }).eq('id', p.id);
    }
  }
  await sb.from('vehicle_maintenance').insert({
    vehicle_name: name, plate: document.getElementById('mp').value.trim(),
    service_date: document.getElementById('md').value,
    notes: document.getElementById('mno').value.trim(),
    items: mItems.map(i => ({ ...i, parts: i.parts ? (allP.find(p => p.id === i.parts) || {}).name || i.parts : null })),
    commissions: mComm, total_charge: tc, total_cost: tco, total_commission: tcomm, net_profit: tc - tco - tcomm, status: '已完成',
  });
  xOv(); toast('✅ 已新增，庫存已扣除'); lMaintList();
}

async function updateMaint(id) {
  const name = document.getElementById('mn').value.trim();
  if (!name) { alert('請填寫車輛名稱'); return; }
  const tc = mItems.reduce((s, i) => s + (i.charge || 0), 0);
  const tco = mItems.reduce((s, i) => s + (i.cost || 0), 0);
  const tcomm = mComm.reduce((s, c) => s + (c.amount || 0), 0);

    else await sb.from('parts_inventory').insert({ name: item.name, category: item.cat, unit: '個', box_quantity: item.qty || 0, cost: item.price || 0 });

function openAddExp() {
  oOv('<h2>新增支出</h2>' +
    '<div class="fg"><label>日期</label><input type="date" id="ed" value="' + new Date().toISOString().split('T')[0] + '"></div>' +
    '<div class="fg"><label>支出項目 *</label><input type="text" id="ei" placeholder="貨車加油"></div>' +
    '<div class="fg"><label>分類</label><select id="ec"><option>⛽ 油料</option><option>🔧 工具/設備</option><option>📦 雜費</option><option>💬 其他</option></select></div>' +
    '<div class="fg"><label>金額（NT$）</label><input type="number" id="ea"></div>' +
    '<div class="fg"><label>備註</label><input type="text" id="en"></div>' +
    '<button class="btn-f" onclick="saveExp()">確認新增</button>');
}

async function saveExp() {
  const item = document.getElementById('ei').value.trim();
  if (!item) { alert('請填支出項目'); return; }
  await sb.from('vehicle_expense').insert({ expense_date: document.getElementById('ed').value, item, category: document.getElementById('ec').value, amount: parseInt(document.getElementById('ea').value) || 0, notes: document.getElementById('en').value.trim() });
  xOv(); toast('✅ 已新增'); lExpList();
}

async function delExp(id) { if (!confirm('確定刪除？')) return; await sb.from('vehicle_expense').delete().eq('id', id); toast('已刪除'); lExpList(); }

// ── 月報表 ──
async function lRpt() {
  const el = document.getElementById('sec-rpt');
  el.innerHTML = '<button class="bk" onclick="back()">← 返回</button>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
    '<div class="st" style="margin:0;">月報表</div>' +
    '<select id="rpt-filter" onchange="renderRpt()" style="padding:6px 10px;border-radius:10px;border:2px solid var(--ps);font-size:12px;color:var(--br);">' +
    '<option value="all">全部月份</option></select></div>' +
    '<div id="rpt-body"><div class="ld">計算中…</div></div>';

  const [ma, ex, so] = await Promise.all([
    sb.from('vehicle_maintenance').select('*'),
    sb.from('vehicle_expense').select('*'),
    sb.from('vehicle_sold').select('*'),
  ]);
  allRptData = { maint: ma.data || [], exp: ex.data || [], sold: so.data || [] };

  const months = new Set();
  (ma.data || []).forEach(m => { if (m.service_date) months.add(m.service_date.substring(0, 7)); });
  (so.data || []).forEach(s => { if (s.sell_date) months.add(s.sell_date.substring(0, 7)); });
  const sel = document.getElementById('rpt-filter');
  Array.from(months).sort((a, b) => b.localeCompare(a)).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
  renderRpt();
}

function renderRpt() {
  const filter = document.getElementById('rpt-filter') ? document.getElementById('rpt-filter').value : 'all';
  const maint = allRptData.maint.filter(m => filter === 'all' || (m.service_date || '').startsWith(filter));
  const exp = allRptData.exp.filter(e => filter === 'all' || (e.expense_date || '').startsWith(filter));
  const sold = allRptData.sold.filter(s => filter === 'all' || (s.sell_date || '').startsWith(filter));

  const commMap = {};
  sold.forEach(v => (v.commissions || []).forEach(c => { const w = c.to || '—'; if (!commMap[w]) commMap[w] = { name: w, amount: 0, soldCount: 0, maintCount: 0 }; commMap[w].amount += (c.amount || 0); commMap[w].soldCount++; }));
  maint.forEach(m => (m.commissions || []).forEach(c => { const w = c.to || '—'; if (!commMap[w]) commMap[w] = { name: w, amount: 0, soldCount: 0, maintCount: 0 }; commMap[w].amount += (c.amount || 0); commMap[w].maintCount++; }));

  const monthMap = {};
  sold.forEach(v => {
    const ym = v.sell_date ? v.sell_date.substring(0, 7) : null;
    if (!ym) return;
    if (!monthMap[ym]) monthMap[ym] = { ym, si: 0, sc: 0, sp: 0, scomm: 0, mi: 0, mc: 0, mp: 0, mcomm: 0, exp: 0 };
    monthMap[ym].si += (v.sell_price || 0);
    const ec = (v.expenses || []).reduce((s, e) => s + (parseInt(e.amount) || 0), 0);
    monthMap[ym].sc += (v.vehicle_cost || 0) + ec;
    const sc = (v.commissions || []).reduce((s, c) => s + (c.amount || 0), 0);
    monthMap[ym].scomm += sc;
    monthMap[ym].sp += (v.sell_price || 0) - (v.vehicle_cost || 0) - ec - sc;
  });
  maint.forEach(m => {
    const ym = m.service_date ? m.service_date.substring(0, 7) : null;
    if (!ym) return;
    if (!monthMap[ym]) monthMap[ym] = { ym, si: 0, sc: 0, sp: 0, scomm: 0, mi: 0, mc: 0, mp: 0, mcomm: 0, exp: 0 };
    monthMap[ym].mi += (m.total_charge || 0);
    monthMap[ym].mc += (m.total_cost || 0);
    monthMap[ym].mcomm += (m.total_commission || 0);
    monthMap[ym].mp += (m.net_profit || 0);
  });
  exp.forEach(e => {
    const ym = e.expense_date ? e.expense_date.substring(0, 7) : null;
    if (!ym) return;
    if (!monthMap[ym]) monthMap[ym] = { ym, si: 0, sc: 0, sp: 0, scomm: 0, mi: 0, mc: 0, mp: 0, mcomm: 0, exp: 0 };
    monthMap[ym].exp += (e.amount || 0);
  });

  const months2 = Object.values(monthMap).sort((a, b) => b.ym.localeCompare(a.ym));
  const totalComm = Object.values(commMap).sort((a, b) => b.amount - a.amount);
  const totSI = sold.reduce((s, v) => s + (v.sell_price || 0), 0);
  const totMI = maint.reduce((s, m) => s + (m.total_charge || 0), 0);
  const totComm = Object.values(commMap).reduce((s, c) => s + c.amount, 0);
  const totExp = exp.reduce((s, e) => s + (e.amount || 0), 0);
  const totSC = sold.reduce((s, v) => s + (v.vehicle_cost || 0) + (v.expenses || []).reduce((a, e) => a + (parseInt(e.amount) || 0), 0), 0);
  const totMC = maint.reduce((s, m) => s + (m.total_cost || 0), 0);
  const totNet = (totSI + totMI) - (totSC + totMC + totComm + totExp);

  document.getElementById('rpt-body').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">' +
    '<div class="card" style="text-align:center;"><div style="font-size:15px;font-weight:900;color:var(--gn);">NT$ ' + (totSI + totMI).toLocaleString() + '</div><div style="font-size:10px;color:#aaa;">總收入</div></div>' +
    '<div class="card" style="text-align:center;"><div style="font-size:15px;font-weight:900;color:var(--rd);">NT$ ' + (totSC + totMC + totComm + totExp).toLocaleString() + '</div><div style="font-size:10px;color:#aaa;">總成本</div></div>' +
    '<div class="card" style="text-align:center;"><div style="font-size:15px;font-weight:900;color:var(--pk);">NT$ ' + totMI.toLocaleString() + '</div><div style="font-size:10px;color:#aaa;">保養收入</div></div>' +
    '<div class="card" style="text-align:center;"><div style="font-size:15px;font-weight:900;color:#856404;">NT$ ' + totComm.toLocaleString() + '</div><div style="font-size:10px;color:#aaa;">總分潤</div></div>' +
    '<div class="card" style="grid-column:span 2;text-align:center;background:linear-gradient(135deg,var(--pm),var(--pk));"><div style="font-size:22px;font-weight:900;color:#fff;">NT$ ' + totNet.toLocaleString() + '</div><div style="font-size:11px;color:rgba(255,255,255,.8);">' + (filter === 'all' ? '累計' : filter) + ' 淨利潤</div></div></div>' +
    (totalComm.length ? '<div class="st">累計分潤總覽</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">' + totalComm.map(c => '<div class="card" style="text-align:center;"><div style="font-size:13px;font-weight:900;color:var(--br);">' + c.name + '</div><div style="font-size:18px;font-weight:900;color:var(--pk);">NT$ ' + c.amount.toLocaleString() + '</div><div style="font-size:10px;color:#aaa;">售車' + c.soldCount + '筆/保養' + c.maintCount + '筆</div></div>').join('') + '</div>' : '') +
    '<div class="st">月份明細</div><div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>月份</th><th>售車收入</th><th>售車成本</th><th>售車利潤</th><th>保養收入</th><th>保養成本</th><th>保養利潤</th><th>總分潤</th><th style="color:var(--pk);">月淨利潤</th></tr></thead><tbody>' +
    months2.map(m => { const net = m.sp + m.mp - m.exp; return '<tr><td style="font-weight:700;">' + m.ym + '</td><td style="color:var(--gn);">NT$' + m.si.toLocaleString() + '</td><td style="color:var(--rd);">NT$' + m.sc.toLocaleString() + '</td><td style="color:' + (m.sp >= 0 ? 'var(--gn)' : 'var(--rd)') + ';">NT$' + m.sp.toLocaleString() + '</td><td style="color:var(--gn);">NT$' + m.mi.toLocaleString() + '</td><td style="color:var(--rd);">NT$' + m.mc.toLocaleString() + '</td><td style="color:' + (m.mp >= 0 ? 'var(--gn)' : 'var(--rd)') + ';">NT$' + m.mp.toLocaleString() + '</td><td>NT$' + (m.scomm + m.mcomm).toLocaleString() + '</td><td style="font-weight:900;color:' + (net >= 0 ? 'var(--gn)' : 'var(--rd)') + ';">NT$' + net.toLocaleString() + '</td></tr>'; }).join('') +
    '</tbody></table></div>';
}

// ── 車輛履歷 ──
async function lHist() {
  document.getElementById('sec-hist').innerHTML =
    '<button class="bk" onclick="back()">← 返回</button><div class="st">車輛履歷查詢</div>' +
    '<div class="sb"><span>🔍</span><input type="text" id="hq" placeholder="輸入車牌或車名…" oninput="sHist()"></div>' +
    '<div id="hr"><div style="text-align:center;padding:30px;color:#ccc;">輸入車牌或車名開始查詢</div></div>';
}

async function sHist() {
  const q = document.getElementById('hq').value.trim();
  if (!q) return;
  const [v, s, m] = await Promise.all([
    sb.from('vehicles').select('*').or('name.ilike.%' + q + '%,plate.ilike.%' + q + '%'),
    sb.from('vehicle_sold').select('*').or('vehicle_name.ilike.%' + q + '%,plate.ilike.%' + q + '%'),
    sb.from('vehicle_maintenance').select('*').or('vehicle_name.ilike.%' + q + '%,plate.ilike.%' + q + '%').order('service_date', { ascending: false }),
  ]);
  let h = '';
  (v.data || []).forEach(x => { const p = x.parts || []; const pt = p.reduce((s, i) => s + (parseInt(i.amount) || 0), 0); h += '<div class="card" style="margin-bottom:10px;"><div style="font-size:13px;font-weight:900;color:var(--br);">🏍️ ' + x.name + (x.plate ? ' (' + x.plate + ')' : '') + '</div><div style="font-size:11px;color:#666;margin-top:4px;">狀態：' + x.status + ' · 年份：' + (x.year || '—') + '年 · 里程：' + (x.mileage ? x.mileage.toLocaleString() + 'km' : '—') + '</div><div style="font-size:11px;color:#666;">售價：NT$ ' + (x.price || 0).toLocaleString() + ' · 總成本：NT$ ' + ((x.cost || 0) + pt).toLocaleString() + '</div></div>'; });
  (s.data || []).forEach(x => { h += '<div class="card" style="margin-bottom:8px;background:#fff8e1;"><div style="font-size:12px;font-weight:700;color:#856404;">💰 售出 ' + (x.sell_date || '') + ' · 收入 NT$ ' + (x.sell_price || 0).toLocaleString() + '</div>' + (x.buyer_name ? '<div style="font-size:11px;color:#666;">👤 ' + x.buyer_name + '</div>' : '') + '</div>'; });
  if ((m.data || []).length) {
    h += '<div class="st">保養記錄</div>';
    (m.data || []).forEach(x => { h += '<div class="card" style="margin-bottom:7px;"><div style="font-size:11px;font-weight:700;color:var(--br);">🔧 ' + (x.service_date || '—') + '</div><div style="font-size:10px;color:#666;">' + (x.items || []).map(i => i.name).join('、') + '</div><div style="font-size:12px;font-weight:700;color:var(--pk);">NT$ ' + (x.total_charge || 0).toLocaleString() + '</div></div>'; });
  }
  document.getElementById('hr').innerHTML = h || '<div class="ld">找不到相關記錄</div>';
}

// ── 定檢提醒 ──
async function lInsp() {
  document.getElementById('sec-insp').innerHTML = '<button class="bk" onclick="back()">← 返回</button><div class="st">定檢提醒</div><div id="insp-l"><div class="ld">載入中…</div></div>';
  const { data } = await sb.from('vehicles').select('id,name,plate,next_inspection').eq('status', '在庫').order('next_inspection');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const withInsp = (data || []).filter(v => v.next_inspection);
  const noInsp = (data || []).filter(v => !v.next_inspection);
  document.getElementById('insp-l').innerHTML = [
    ...withInsp.map(v => {
      const d = new Date(v.next_inspection);
      const days = Math.ceil((d - today) / 86400000);
      const sc = days < 0 ? 'pr' : days <= 30 ? 'py' : 'pg';
      const status = days < 0 ? '已逾期' : days <= 30 ? '即將到期' : '狀態正常';
      return '<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
        '<div><div style="font-size:12px;font-weight:700;color:var(--br);">🏍️ ' + v.name + (v.plate ? ' (' + v.plate + ')' : '') + '</div>' +
        '<div style="font-size:11px;color:#666;">📅 ' + new Date(v.next_inspection).toLocaleDateString('zh-TW') + '</div>' +
        '<div style="font-size:10px;color:#aaa;">' + (days < 0 ? '逾期' + Math.abs(days) + '天' : '還有' + days + '天') + '</div></div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">' +
        '<span class="pill ' + sc + '">' + status + '</span>' +
        '<button class="bs bc" onclick="updInsp(\'' + v.id + '\',\'' + v.next_inspection + '\')">更新</button></div></div>';
    }),
    ...noInsp.map(v => '<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;opacity:.7;">' +
      '<div><div style="font-size:12px;font-weight:700;color:var(--br);">🏍️ ' + v.name + (v.plate ? ' (' + v.plate + ')' : '') + '</div>' +
      '<div style="font-size:10px;color:#aaa;">未設定定檢日期</div></div>' +
      '<button class="bs bc" onclick="updInsp(\'' + v.id + '\',\'\')">設定</button></div>'),
  ].join('') || '<div class="ld">所有車輛定檢正常 ✅</div>';
}

// ── 會員管理 ──
async function lMbr() {
  document.getElementById('sec-mbr').innerHTML = '<button class="bk" onclick="back()">← 返回</button><div class="st">會員管理</div><div id="mbl"><div class="ld">載入中…</div></div>';
  const { data } = await sb.from('members').select('*').order('created_at', { ascending: false });
  const rl = { customer: '👤 客人', technician: '🔧 技師', sales: '💼 業務', secretary: '📋 秘書', boss: '👑 老闆' };
  document.getElementById('mbl').innerHTML = (data || []).map(m =>
    '<div class="card" style="margin-bottom:8px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">' +
    '<span style="font-size:12px;font-weight:900;color:var(--br);">' + (m.name || '未命名') + '</span>' +
    '<select onchange="upRole(\'' + m.id + '\',this.value)" style="padding:4px 7px;border-radius:8px;border:2px solid var(--ps);font-size:10px;font-weight:700;color:var(--br);">' +
    Object.entries(rl).map(([v, l]) => '<option value="' + v + '"' + (m.role === v ? ' selected' : '') + '>' + l + '</option>').join('') +
    '</select></div>' +
    '<div style="font-size:10px;color:#aaa;">' + (m.phone || '—') + (m.line_id ? ' · ' + m.line_id : '') + '</div></div>'
  ).join('') || '<div class="ld">尚無會員</div>';
}

async function upRole(id, r) { await sb.from('members').update({ role: r }).eq('id', id); toast('✅ 角色已更新'); }

init().catch(console.error);
</script>
