<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>後台管理 | 驃宇重車</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff85a1;--pl:#fff0f3;--ps:#ffd6e0;--pm:#ffb3c6;--brown:#6b3f2a;--dark:#1a1a1a;--red:#e53935;--green:#0a6624;--gl:#d1f7d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--pl);min-height:100vh;}
.topbar{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.topbar img{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.topbar h1{color:#fff;font-size:17px;font-weight:700;}
.topbar p{color:var(--red);font-size:10px;letter-spacing:1px;}
#home{padding:14px 14px 50px;}
.stats-card{background:linear-gradient(135deg,var(--pm),var(--pink));border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 8px 24px rgba(255,133,161,.3);position:relative;overflow:hidden;}
.stats-card::before{content:'🌸';font-size:80px;position:absolute;right:-10px;top:-10px;opacity:.12;}
.stats-card h2{color:#fff;font-size:13px;font-weight:500;margin-bottom:12px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.si{background:rgba(255,255,255,.2);border-radius:12px;padding:11px;}
.si .n{color:#fff;font-size:21px;font-weight:900;}
.si .l{color:rgba(255,255,255,.8);font-size:11px;margin-top:2px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc{background:#fff;border-radius:16px;border:2px solid var(--ps);padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.mc:hover{border-color:var(--pink);transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,133,161,.18);}
.mc:active{transform:scale(.97);}
.mc .mi{font-size:30px;margin-bottom:7px;}
.mc .ml{font-size:12px;font-weight:700;color:var(--brown);}
.badge{position:absolute;top:9px;right:9px;background:var(--red);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;}
.sec{display:none;padding:14px 14px 60px;}
.sec.on{display:block;}
.stitle{font-size:13px;font-weight:900;color:var(--brown);margin:14px 0 10px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--pm),transparent);border-radius:2px;}
.bk{display:inline-flex;align-items:center;gap:6px;background:var(--pl);border:2px solid var(--ps);border-radius:12px;padding:8px 16px;font-size:13px;font-weight:700;color:var(--pink);cursor:pointer;margin-bottom:14px;font-family:'Noto Sans TC',sans-serif;}
.ld{text-align:center;padding:50px 20px;color:#ccc;font-size:13px;}
.card{background:#fff;border-radius:16px;border:2px solid var(--ps);padding:15px;margin-bottom:10px;}
.vc{background:#fff;border-radius:16px;border:2px solid var(--ps);overflow:hidden;margin-bottom:11px;}
.vh{background:linear-gradient(135deg,var(--pl),#fff);padding:12px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--ps);}
.vt{font-size:14px;font-weight:900;color:var(--brown);}
.vb{padding:13px 15px;}
.vr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f8f0f2;font-size:12px;}
.vr:last-child{border:none;}
.vr .k{color:#aaa;}
.vr .v{font-weight:700;color:var(--brown);}
.va{display:flex;gap:7px;padding:11px 15px;border-top:2px solid var(--ps);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--brown);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border-radius:12px;border:2px solid var(--ps);background:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--brown);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--pink);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.pg{background:var(--gl);color:var(--green);}
.py{background:#fff3cd;color:#856404;}
.pb{background:#d0e8ff;color:#1456a0;}
.pr{background:#ffeeee;color:var(--red);}
.pgr{background:#eee;color:#888;}
.bs{padding:7px 12px;border-radius:9px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.be{background:#e8f4ff;color:#1456a0;}
.bd{background:#ffeeee;color:var(--red);}
.bc{background:var(--gl);color:var(--green);}
.bj{background:#ffeeee;color:var(--red);}
.btn{padding:10px 18px;border-radius:12px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btnp{background:linear-gradient(135deg,var(--pm),var(--pink));color:#fff;}
.btnf{width:100%;padding:14px;background:linear-gradient(135deg,var(--pm),var(--pink));color:#fff;border:none;border-radius:16px;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;margin-top:8px;}
.sb{background:#fff;border-radius:12px;border:2px solid var(--ps);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sb input{flex:1;border:none;outline:none;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--brown);}
.ft{display:flex;gap:7px;margin-bottom:11px;overflow-x:auto;padding-bottom:2px;}
.ft::-webkit-scrollbar{display:none;}
.fp{white-space:nowrap;padding:6px 13px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;border:2px solid var(--ps);color:#aaa;}
.fp.on{background:var(--pink);border-color:var(--pink);color:#fff;}
.prog{background:var(--ps);border-radius:6px;height:8px;overflow:hidden;margin:7px 0;}
.pf{height:100%;background:linear-gradient(90deg,var(--pm),var(--pink));border-radius:6px;}
.chip{display:inline-flex;align-items:center;background:var(--pl);border-radius:8px;padding:3px 8px;font-size:11px;color:#c9667c;margin:2px 2px 0 0;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;}
.ov.on{display:flex;}
.sh{background:#fff;border-radius:24px 24px 0 0;padding:22px 18px 44px;width:100%;max-height:90vh;overflow-y:auto;animation:su .3s ease;position:relative;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-h{width:40px;height:4px;background:#eee;border-radius:2px;margin:0 auto 18px;}
.sh-x{position:absolute;top:16px;right:18px;font-size:22px;cursor:pointer;color:#ccc;}
.sh h2{font-size:17px;font-weight:900;color:var(--brown);margin-bottom:16px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:11px 22px;border-radius:22px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.on{opacity:1;}
.au{background:#fff;border-radius:16px;border:2px dashed var(--ps);padding:22px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all .2s;}
.au:hover{border-color:var(--pink);background:var(--pl);}
.au .ai{font-size:38px;margin-bottom:8px;}
.au .at{font-size:13px;font-weight:700;color:var(--brown);}
.au .as{font-size:11px;color:#aaa;margin-top:4px;}
.spin{display:block;font-size:30px;animation:sp 1s linear infinite;}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.ts{background:var(--pl);border-radius:12px;padding:12px;margin-bottom:12px;}
.tr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.tr .k{color:#aaa;} .tr .v{font-weight:700;color:var(--brown);}
.ir{display:grid;grid-template-columns:1fr 80px 28px;gap:6px;margin-bottom:6px;align-items:center;}
.ir input{padding:8px 10px;border-radius:10px;border:2px solid var(--ps);font-size:12px;color:var(--brown);outline:none;}
.ir input:focus{border-color:var(--pink);}
.rm{width:28px;height:28px;border-radius:50%;background:#ffeeee;border:none;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.addbtn{width:100%;padding:9px;background:var(--pl);border:2px dashed var(--ps);border-radius:10px;font-size:12px;font-weight:700;color:var(--pink);cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:11px;}
</style>
</head>
<body>
<div class="topbar">
  <img src="https://dora103277.github.io/piao-car/logo.jpg" onerror="this.style.display='none'">
  <div><h1>後台管理</h1><p>PIAO YU. 秘書/老闆</p></div>
</div>

<div id="home">
  <div class="stats-card">
    <h2>📊 即時概覽</h2>
    <div class="sg">
      <div class="si"><div class="n" id="sV">-</div><div class="l">在庫車輛</div></div>
      <div class="si"><div class="n" id="sB">-</div><div class="l">待處理預約</div></div>
      <div class="si"><div class="n" id="sR">-</div><div class="l">庫存待確認</div></div>
      <div class="si"><div class="n" id="sI">-</div><div class="l">進行中尾款</div></div>
    </div>
  </div>
  <div class="menu-grid">
    <div class="mc" onclick="go('req')"><div class="mi">⚠️</div><div class="ml">庫存申請確認</div><div class="badge" id="badgeR">0</div></div>
    <div class="mc" onclick="go('veh')"><div class="mi">🏍️</div><div class="ml">車輛管理</div></div>
    <div class="mc" onclick="go('bk')"><div class="mi">📋</div><div class="ml">所有預約</div></div>
    <div class="mc" onclick="go('inst')"><div class="mi">💰</div><div class="ml">尾款管理</div></div>
    <div class="mc" onclick="go('inv')"><div class="mi">📦</div><div class="ml">零件庫存</div></div>
    <div class="mc" onclick="go('maint')"><div class="mi">🔧</div><div class="ml">保養記錄</div></div>
    <div class="mc" onclick="go('exp')"><div class="mi">💸</div><div class="ml">其他支出</div></div>
    <div class="mc" onclick="go('rpt')"><div class="mi">📊</div><div class="ml">月報表</div></div>
    <div class="mc" onclick="go('hist')"><div class="mi">🔍</div><div class="ml">車輛履歷</div></div>
    <div class="mc" onclick="go('mbr')"><div class="mi">👥</div><div class="ml">會員管理</div></div>
  </div>
</div>

<div class="sec" id="sec-req"></div>
<div class="sec" id="sec-veh"></div>
<div class="sec" id="sec-bk"></div>
<div class="sec" id="sec-inst"></div>
<div class="sec" id="sec-inv"></div>
<div class="sec" id="sec-maint"></div>
<div class="sec" id="sec-exp"></div>
<div class="sec" id="sec-rpt"></div>
<div class="sec" id="sec-hist"></div>
<div class="sec" id="sec-mbr"></div>

<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="sh" id="sh"><div class="sh-h"></div><span class="sh-x" onclick="closeOvX()">✕</span><div id="shc"></div></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="aiPic" accept="image/*" capture="environment" style="display:none" onchange="aiRead(event)">

<script>
const SU='https://ufgpslpjtpzrtctrwdmj.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ3BzbHBqdHB6cnRjdHJ3ZG1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzQyNjAsImV4cCI6MjA5Mjk1MDI2MH0.KK7noEUvdr4bPZEP8ihWXxlGGVK0hH-J5BHWjwX4nDg';
const LIFF='2009926811-e1vXaP7l';
const sb=supabase.createClient(SU,SK);
let uid='',role='',editVid=null,allV=[],allP=[],allM=[];

async function init(){
  await liff.init({liffId:LIFF});
  if(!liff.isLoggedIn()){liff.login();return;}
  const p=await liff.getProfile();uid=p.userId;
  const{data:m}=await sb.from('members').select('role').eq('line_user_id',uid).single();
  if(!m||(m.role!=='secretary'&&m.role!=='boss')){
    document.getElementById('home').innerHTML='<div class="ld">🔒 僅秘書/老闆可使用</div>';return;
  }
  role=m.role; loadStats();
}

async function loadStats(){
  const[v,b,r,i]=await Promise.all([
    sb.from('vehicles').select('*',{count:'exact',head:true}).eq('status','在庫'),
    sb.from('bookings').select('*',{count:'exact',head:true}).eq('status','待確認'),
    sb.from('inventory_requests').select('*',{count:'exact',head:true}).eq('status','待確認'),
    sb.from('installments').select('*',{count:'exact',head:true}).eq('status','繳款中'),
  ]);
  document.getElementById('sV').textContent=v.count||0;
  document.getElementById('sB').textContent=b.count||0;
  document.getElementById('sR').textContent=r.count||0;
  document.getElementById('sI').textContent=i.count||0;
  document.getElementById('badgeR').textContent=r.count||0;
}

function go(s){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));
  document.getElementById('sec-'+s).classList.add('on');
  ({req:loadReq,veh:loadVeh,bk:loadBk,inst:loadInst,inv:loadInv,maint:loadMaint,exp:loadExp,rpt:loadRpt,hist:loadHist,mbr:loadMbr})[s]?.();
}
function back(){
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));
  document.getElementById('home').style.display='block';
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
function openOv(h){document.getElementById('shc').innerHTML=h;document.getElementById('ov').classList.add('on');}
function closeOv(e){if(e.target===document.getElementById('ov'))closeOvX();}
function closeOvX(){document.getElementById('ov').classList.remove('on');}

// ── 庫存申請 ──
async function loadReq(){
  const el=document.getElementById('sec-req');
  el.innerHTML=`<button class="bk" onclick="back()">← 返回</button><div class="stitle">庫存申請確認</div><div id="rl"><div class="ld">載入中…</div></div>`;
  const{data}=await sb.from('inventory_requests').select('*').order('created_at',{ascending:false});
  const list=data||[];
  const pending=list.filter(r=>r.status==='待確認');
  const done=list.filter(r=>r.status!=='待確認');
  let html=pending.length?pending.map(r=>rCard(r,true)).join(''):'<div class="ld" style="padding:24px;">沒有待確認 ✅</div>';
  if(done.length)html+=`<div class="stitle">已處理</div>`+done.slice(0,5).map(r=>rCard(r,false)).join('');
  document.getElementById('rl').innerHTML=html;
}
function rCard(r,can){
  const sc={待確認:'py',已確認:'pg',已拒絕:'pr'};
  return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
      <span style="font-size:13px;font-weight:900;color:var(--brown);">🔧 ${r.vehicle_name||'—'} ${r.plate?'('+r.plate+')':''}</span>
      <span class="pill ${sc[r.status]||'pgr'}">${r.status}</span>
    </div>
    <div style="font-size:12px;color:#666;margin-bottom:6px;">👔 ${r.technician_name||'—'} · ${new Date(r.created_at).toLocaleDateString('zh-TW')}</div>
    <div style="border-top:1px solid var(--ps);padding-top:7px;">
      ${(r.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:#666;padding:2px 0;"><span>${i.name}</span><span>×${i.quantity||1} NT$${i.price||0}</span></div>`).join('')}
    </div>
    ${can?`<div style="display:flex;gap:7px;margin-top:9px;">
      <button class="bs bc" onclick="confReq('${r.id}')">✓ 確認扣庫存</button>
      <button class="bs bj" onclick="rejReq('${r.id}')">✕ 拒絕</button>
    </div>`:''}
  </div>`;
}
async function confReq(id){
  const{data:r}=await sb.from('inventory_requests').select('*').eq('id',id).single();
  for(const item of(r.items||[])){
    const{data:p}=await sb.from('parts_inventory').select('*').ilike('name',`%${item.name}%`).single();
    if(p)await sb.from('parts_inventory').update({box_quantity:Math.max(0,(p.box_quantity||0)-(item.quantity||1))}).eq('id',p.id);
  }
  await sb.from('inventory_requests').update({status:'已確認',confirmed_by:uid,confirmed_at:new Date().toISOString()}).eq('id',id);
  if(r.maintenance_id)await sb.from('vehicle_maintenance').update({status:'已完成'}).eq('id',r.maintenance_id);
  toast('✅ 庫存已扣除'); loadReq(); loadStats();
}
async function rejReq(id){
  await sb.from('inventory_requests').update({status:'已拒絕'}).eq('id',id);
  toast('已拒絕'); loadReq();
}

// ── 車輛管理 ──
async function loadVeh(){
  document.getElementById('sec-veh').innerHTML=`
    <button class="bk" onclick="back()">← 返回</button>
    <button class="btn btnp" style="float:right;margin-bottom:14px;" onclick="openAddV()">＋ 新增車輛</button>
    <div style="clear:both;"></div>
    <div class="sb"><span>🔍</span><input type="text" id="vs" placeholder="搜尋車名、車牌…" oninput="fV()"></div>
    <div class="ft">
      <div class="fp on" onclick="lvl('在庫',this)">在庫</div>
      <div class="fp" onclick="lvl('已售出',this)">已售出</div>
      <div class="fp" onclick="lvl('all',this)">全部</div>
    </div>
    <div id="vl"><div class="ld">載入中…</div></div>`;
  await lvl('在庫', document.querySelector('.fp.on'));
}
let vSt='在庫';
async function lvl(s,el){
  vSt=s;
  document.querySelectorAll('.fp').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  let q=sb.from('vehicles').select('*').order('created_at',{ascending:false});
  if(s!=='all')q=q.eq('status',s);
  const{data}=await q; allV=data||[]; rvl(allV);
}
function fV(){const q=document.getElementById('vs').value.toLowerCase();rvl(allV.filter(v=>(v.name||'').toLowerCase().includes(q)||(v.plate||'').toLowerCase().includes(q)));}
function rvl(list){
  if(!list.length){document.getElementById('vl').innerHTML='<div class="ld">沒有車輛</div>';return;}
  document.getElementById('vl').innerHTML=list.map(v=>{
    const profit=(v.price||0)-(v.cost||0);
    const sc=v.status==='在庫'?'pg':v.status==='已售出'?'pgr':'py';
    return `<div class="vc">
      <div class="vh"><span class="vt">🏍️ ${v.name}</span><span class="pill ${sc}">${v.status}</span></div>
      <div class="vb">
        <div class="vr"><span class="k">車牌</span><span class="v">${v.plate||'—'}</span></div>
        <div class="vr"><span class="k">年份</span><span class="v">${v.year||'—'}年</span></div>
        <div class="vr"><span class="k">里程</span><span class="v">${v.mileage?(v.mileage/10000).toFixed(1)+'萬km':'—'}</span></div>
        <div class="vr"><span class="k">售價</span><span class="v" style="color:var(--pink);">NT$ ${(v.price||0).toLocaleString()}</span></div>
        <div class="vr"><span class="k">成本</span><span class="v">NT$ ${(v.cost||0).toLocaleString()}</span></div>
        <div class="vr"><span class="k">毛利</span><span class="v" style="color:${profit>=0?'var(--green)':'var(--red)'};">NT$ ${profit.toLocaleString()}</span></div>
        ${v.next_inspection?`<div class="vr"><span class="k">下次定檢</span><span class="v">${new Date(v.next_inspection).toLocaleDateString('zh-TW')}</span></div>`:''}
      </div>
      <div class="va">
        <button class="bs be" onclick="editV('${v.id}')">✏️ 編輯</button>
        ${v.status==='在庫'?`<button class="bs" style="background:#fff8e1;color:#856404;" onclick="soldV('${v.id}','${v.name}')">💰 售出</button>`:''}
        <button class="bs bd" onclick="delV('${v.id}','${v.name}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}
function vForm(v={}){
  return `
    <div class="fg"><label>車輛名稱 *</label><input type="text" id="vn" value="${v.name||''}" placeholder="Yamaha R15M"></div>
    <div class="fg2">
      <div class="fg"><label>車牌</label><input type="text" id="vp" value="${v.plate||''}" placeholder="ABC-1234"></div>
      <div class="fg"><label>年份</label><input type="number" id="vy" value="${v.year||''}" placeholder="2022"></div>
    </div>
    <div class="fg2">
      <div class="fg"><label>里程（km）</label><input type="number" id="vm" value="${v.mileage||''}" placeholder="0"></div>
      <div class="fg"><label>顏色</label><input type="text" id="vc" value="${v.color||''}" placeholder="消光黑"></div>
    </div>

async function aiRead(ev){
  const file=ev.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const ais=document.getElementById('ais');
    if(ais)ais.innerHTML='<div style="text-align:center;padding:16px;"><span class="spin">⚙️</span><div style="font-size:12px;color:#aaa;margin-top:6px;">AI 辨識中…</div></div>';
    try{
      const b64=e.target.result.split(',')[1];
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
            {type:'text',text:'辨識車輛資料，JSON格式回傳，不要其他文字：{"name":"車名","plate":"車牌","year":年份數字或null,"mileage":里程數字或null,"color":"顏色","price":售價數字或null,"cost":成本數字或null}'}
          ]}]})
      });
      const d=await res.json();
      const j=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
      if(j.name)document.getElementById('vn').value=j.name;
      if(j.plate)document.getElementById('vp').value=j.plate;
      if(j.year)document.getElementById('vy').value=j.year;
      if(j.mileage)document.getElementById('vm').value=j.mileage;
      if(j.color)document.getElementById('vc').value=j.color;
      if(j.price)document.getElementById('vpr').value=j.price;
      if(j.cost)document.getElementById('vco').value=j.cost;
      if(ais)ais.innerHTML='<div style="background:var(--gl);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:12px;">✅ 辨識完成，請確認並修改</div>';
    }catch(e){if(ais)ais.innerHTML='<div style="font-size:12px;color:#aaa;margin-bottom:10px;">辨識失敗，請手動填寫</div>';}
  };
  reader.readAsDataURL(file);
}

    </div>
    ${(data||[]).map(e=>`<div class="card" style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <div><div style="font-size:13px;font-weight:700;color:var(--brown);">${e.item}</div>
      <div style="font-size:11px;color:#aaa;">${e.expense_date||''} · ${e.category||''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
        <div style="font-size:16px;font-weight:900;color:var(--red);">NT$ ${(e.amount||0).toLocaleString()}</div>
        <button class="bs bd" onclick="delExp('${e.id}')">🗑️</button>
      </div>
    </div>`).join('')||'<div class="ld">尚無支出</div>'}`;
}
function openAddExp(){openOv(`<h2>新增支出</h2>
  <div class="fg"><label>日期</label><input type="date" id="ed" value="${new Date().toISOString().split('T')[0]}"></div>
  <div class="fg"><label>支出項目 *</label><input type="text" id="ei" placeholder="貨車加油、工具購買"></div>
  <div class="fg"><label>分類</label><select id="ec"><option>⛽ 油料</option><option>🔧 工具/設備</option><option>📦 雜費</option><option>💬 其他</option></select></div>
  <div class="fg"><label>金額（NT$）</label><input type="number" id="ea" placeholder="0"></div>
  <div class="fg"><label>備註</label><input type="text" id="en" placeholder="選填"></div>
  <button class="btnf" onclick="saveExp()">確認新增</button>`);}
async function saveExp(){
  const item=document.getElementById('ei').value.trim();if(!item){alert('請填支出項目');return;}
  await sb.from('vehicle_expense').insert({expense_date:document.getElementById('ed').value,item,
    category:document.getElementById('ec').value,amount:parseInt(document.getElementById('ea').value)||0,
    notes:document.getElementById('en').value.trim()});
  closeOvX(); toast('✅ 已新增'); lExp();
}
async function delExp(id){if(!confirm('確定刪除？'))return;await sb.from('vehicle_expense').delete().eq('id',id);toast('已刪除');lExp();}

// ── 月報表 ──
async function loadRpt(){
  const el=document.getElementById('sec-rpt');
  el.innerHTML=`<button class="bk" onclick="back()">← 返回</button><div class="stitle">月報表</div><div class="ld">計算中…</div>`;
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+1;
  const f=`${y}-${String(m).padStart(2,'0')}-01`;
  const[ma,ex,so]=await Promise.all([
    sb.from('vehicle_maintenance').select('total_charge,total_cost').gte('service_date',f),
    sb.from('vehicle_expense').select('amount').gte('expense_date',f),
    sb.from('vehicle_sold').select('sell_price,vehicle_cost').gte('sell_date',f),
  ]);
  const mi=(ma.data||[]).reduce((s,x)=>s+(x.total_charge||0),0);
  const mc=(ma.data||[]).reduce((s,x)=>s+(x.total_cost||0),0);
  const et=(ex.data||[]).reduce((s,x)=>s+(x.amount||0),0);
  const si=(so.data||[]).reduce((s,x)=>s+(x.sell_price||0),0);
  const sc=(so.data||[]).reduce((s,x)=>s+(x.vehicle_cost||0),0);
  const ti=mi+si, tc=mc+sc+et, np=ti-tc;
  el.innerHTML=`<button class="bk" onclick="back()">← 返回</button>
  <div class="stitle">${y}年${m}月 報表</div>
  <div style="background:linear-gradient(135deg,var(--pm),var(--pink));border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 8px 24px rgba(255,133,161,.3);">
    <div style="color:rgba(255,255,255,.85);font-size:13px;">本月淨利潤</div>
    <div style="color:#fff;font-size:34px;font-weight:900;margin:6px 0;">${np>=0?'+':''}NT$ ${np.toLocaleString()}</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:var(--green);">NT$ ${ti.toLocaleString()}</div><div style="font-size:11px;color:#aaa;margin-top:3px;">總收入</div></div>
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:var(--red);">NT$ ${tc.toLocaleString()}</div><div style="font-size:11px;color:#aaa;margin-top:3px;">總成本+支出</div></div>
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:var(--pink);">NT$ ${mi.toLocaleString()}</div><div style="font-size:11px;color:#aaa;margin-top:3px;">保養收入</div></div>
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:var(--pink);">NT$ ${si.toLocaleString()}</div><div style="font-size:11px;color:#aaa;margin-top:3px;">售車收入</div></div>
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:#856404;">NT$ ${et.toLocaleString()}</div><div style="font-size:11px;color:#aaa;margin-top:3px;">其他支出</div></div>
    <div class="card" style="text-align:center;"><div style="font-size:19px;font-weight:900;color:#aaa;">${(so.data||[]).length}台</div><div style="font-size:11px;color:#aaa;margin-top:3px;">本月售出</div></div>
  </div>`;
}

// ── 車輛履歷 ──
async function loadHist(){
  document.getElementById('sec-hist').innerHTML=`<button class="bk" onclick="back()">← 返回</button>
  <div class="stitle">車輛履歷查詢</div>
  <div class="sb"><span>🔍</span><input type="text" id="hq" placeholder="輸入車牌或車名…" oninput="sHist()"></div>
  <div id="hr"><div style="text-align:center;padding:40px;color:#ccc;">輸入車牌或車名開始查詢</div></div>`;
}
async function sHist(){
  const q=document.getElementById('hq').value.trim();if(!q)return;
  const[v,m]=await Promise.all([
    sb.from('vehicles').select('*').or(`name.ilike.%${q}%,plate.ilike.%${q}%`),
    sb.from('vehicle_maintenance').select('*').or(`vehicle_name.ilike.%${q}%,plate.ilike.%${q}%`).order('service_date',{ascending:false}),
  ]);
  let h='';
  (v.data||[]).forEach(x=>{h+=`<div class="card" style="margin-bottom:10px;"><div style="font-size:14px;font-weight:900;color:var(--brown);">🏍️ ${x.name} ${x.plate?'('+x.plate+')':''}</div><div style="font-size:12px;color:#666;margin-top:4px;">狀態：${x.status} · 售價：NT$ ${(x.price||0).toLocaleString()} · 成本：NT$ ${(x.cost||0).toLocaleString()}</div></div>`;});
  if((m.data||[]).length){h+=`<div class="stitle">保養記錄</div>`;(m.data||[]).forEach(x=>{h+=`<div class="card" style="margin-bottom:8px;"><div style="font-size:12px;font-weight:700;color:var(--brown);">🔧 ${x.service_date||'—'}</div><div style="font-size:12px;color:#666;margin-top:3px;">${(x.items||[]).map(i=>i.name).join('、')||'—'}</div><div style="font-size:13px;font-weight:700;color:var(--pink);margin-top:3px;">NT$ ${(x.total_charge||0).toLocaleString()}</div></div>`;});}
  document.getElementById('hr').innerHTML=h||'<div class="ld">找不到相關記錄</div>';
}

// ── 會員管理 ──
async function loadMbr(){
  document.getElementById('sec-mbr').innerHTML=`<button class="bk" onclick="back()">← 返回</button><div class="stitle">會員管理</div><div id="mbl"><div class="ld">載入中…</div></div>`;
  const{data}=await sb.from('members').select('*').order('created_at',{ascending:false});
  const rl={customer:'👤 客人',technician:'🔧 技師',sales:'💼 業務',secretary:'📋 秘書',boss:'👑 老闆'};
  document.getElementById('mbl').innerHTML=(data||[]).map(m=>`
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:13px;font-weight:900;color:var(--brown);">${m.name||'未命名'}</span>
        <select onchange="upRole('${m.id}',this.value)" style="padding:5px 8px;border-radius:9px;border:2px solid var(--ps);font-size:11px;font-weight:700;color:var(--brown);">
          ${Object.entries(rl).map(([v,l])=>`<option value="${v}" ${m.role===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div style="font-size:12px;color:#aaa;">${m.phone||'—'} ${m.line_id?'· '+m.line_id:''}</div>
    </div>
  `).join('')||'<div class="ld">尚無會員</div>';
}
async function upRole(id,r){await sb.from('members').update({role:r}).eq('id',id);toast('✅ 角色已更新');}

init().catch(console.error);
</script>
</body>
